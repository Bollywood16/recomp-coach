/* ============================ AI COACH (in-app, direct API) ============================ */
/* Calls the Anthropic API directly from the browser using the user's own API
   key (stored ONLY in this device's localStorage — never synced to the cloud
   blob). Deterministic metrics are computed here; hard safety gates run in
   code AFTER the model responds. The LLM interprets and narrates; rules decide. */

const API_KEY_LS = "recompcoach:apikey";

function coachMetrics(data) {
  const sessions = data.sessions || [];
  const trained = ALL_KNOWN.filter((ex) => sessions.some((s) => s.exerciseId === ex.id));
  const lifts = trained.map((ex) => {
    const series = weeklySeries(sessions, ex.id);
    const t = trendPct(series);
    const stalled = series.length >= 3 &&
      series[series.length - 1].e1 <= series[series.length - 3].e1 * 1.005;
    return {
      id: ex.id, name: ex.name, group: CAT_TO_GROUP[ex.cat] || ex.cat,
      weeksLogged: series.length,
      latestE1: series.length ? Math.round(series[series.length - 1].e1) : null,
      trendPct: t ? Math.round(t.pct * 10) / 10 : null,
      stalled,
    };
  });
  const w = [...(data.weights || [])].sort((a, b) => (a.date < b.date ? -1 : 1));
  let bwSlope = null;
  if (w.length >= 4) {
    const half = Math.floor(w.length / 2);
    const avg = (a) => a.reduce((x, y) => x + y.lbs, 0) / a.length;
    const spanDays = (new Date(w[w.length - 1].date) - new Date(w[0].date)) / 86400000 || 1;
    bwSlope = Math.round(((avg(w.slice(half)) - avg(w.slice(0, half))) / (spanDays / 7)) * 100) / 100;
  }
  return {
    weeksTraining: trainingWeeks(sessions),
    totalSessions: sessions.length,
    latestBw: w.length ? w[w.length - 1].lbs : null,
    bwSlopePerWeek: bwSlope,
    stalledLifts: lifts.filter((l) => l.weeksLogged >= 3 && l.stalled).length,
    lifts: lifts.filter((l) => l.weeksLogged >= 1),
    currentPlan: data.plan || null,
    currentFocus: data.focus || null,
    nutritionTarget: computeNutrition(data.nutrition || DEFAULT_NUTRITION, w.length ? w[w.length - 1].lbs : null).target,
    deloadActive: deloadActive(data),
  };
}

function applyCoachGates(rec, metrics, injuryRecovery) {
  const gated = { ...rec, gates: [] };
  if (injuryRecovery && metrics.weeksTraining < 8 && gated.template !== "balanced") {
    gated.gates.push(`Overrode "${TEMPLATES.find((t) => t.key === gated.template)?.name || gated.template}" → Balanced: you're ${metrics.weeksTraining} logged week(s) into a return from injury. Two lighter lower-body exposures/week beats one concentrated session while tendons rebuild — this gate lifts automatically around week 8.`);
    gated.template = "balanced";
  }
  if (!TEMPLATES.some((t) => t.key === gated.template)) { gated.template = "balanced"; gated.gates.push("Unknown template from model — defaulted to Balanced."); }
  const lv = ["maintain", "normal", "emphasize", "specialize"];
  const f = gated.focus || {};
  Object.keys(MUSCLE_GROUPS).forEach((g) => { if (!lv.includes(f[g])) f[g] = "normal"; });
  const emphasized = Object.values(f).filter((v) => v === "emphasize" || v === "specialize").length;
  if (emphasized > 2) gated.gates.push(`Model emphasized ${emphasized} muscle groups — research supports 1–2 at a time; consider trimming one.`);
  gated.focus = f;
  const cd = Number(gated.calorieDelta) || 0;
  gated.calorieDelta = Math.max(-300, Math.min(300, cd));
  if (![45, 60, 75].includes(gated.sessionMin)) gated.sessionMin = (metrics.currentPlan && metrics.currentPlan.sessionMin) || 60;
  return gated;
}

async function askCoachLLM(apiKey, metrics, goalProfile) {
  const prompt = `You are the analytical coaching brain inside a hypertrophy/recomposition training app. All metrics below were computed deterministically from the user's real logs — never invent numbers. Interpret the goal, assess progress vs goal, recommend settings, and PUSH BACK wherever the user's stated desires conflict with their constraints (especially injury recovery). Ground reasoning in established research: ~2x/week frequency default; 10-20 hard sets/muscle/week productive; specialization = reallocation (max 1-2 muscles, others to maintenance); deload on multi-lift stalls; recomp pace -0.5 to -0.75 lb/week; post-injury re-entry favors frequent submaximal exposure for ~8 weeks before specialization.

Nutrition logic: bwSlopePerWeek < -1.0 AND multiple stalls → deficit too aggressive, positive calorieDelta. Slope >= 0 for weeks with a fat-loss goal → small negative delta. Lifts progressing AND slope -0.25 to -0.75 → recomp working, delta 0.

USER GOAL PROFILE: ${JSON.stringify(goalProfile)}
METRICS: ${JSON.stringify(metrics)}

Respond ONLY with JSON, no markdown fences:
{"template":"balanced|upperFocus|superhero","focus":{${Object.keys(MUSCLE_GROUPS).map((g) => `"${g}":"..."`).join(",")}},"sessionMin":45,"calorieDelta":0,"pushback":["<each disagreement with the user's desires and why; empty array if none>"],"assessment":"<2-4 sentences, progress vs goal, using the real numbers>","nutritionNote":"<1-2 sentences>","nextCheckIn":"<what to watch over 2-4 weeks>"}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(res.status === 401 ? "API key rejected — check it in settings." : `API error ${res.status}: ${t.slice(0, 140)}`);
  }
  const out = await res.json();
  const text = (out.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

function CoachCard({ data, persist }) {
  const [apiKey, setApiKey] = useState(localStorage.getItem(API_KEY_LS) || "");
  const [showSettings, setShowSettings] = useState(!localStorage.getItem(API_KEY_LS));
  const gp = data.goalProfile || { text: "", injuryRecovery: true };
  const [goalText, setGoalText] = useState(gp.text || "");
  const [injury, setInjury] = useState(gp.injuryRecovery !== false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [result, setResult] = useState(null);
  const [applied, setApplied] = useState(false);
  const [pasted, setPasted] = useState("");
  const [copyMsg, setCopyMsg] = useState("");
  const weeks = trainingWeeks(data.sessions || []);
  const UNLOCK_WEEKS = 3;
  const unlocked = weeks >= UNLOCK_WEEKS;

  const currentProfile = () => ({ text: goalText.trim(), injuryRecovery: injury, updatedAt: new Date().toISOString() });

  const copyBrief = async () => {
    if (!goalText.trim()) { setErr("Describe your goal first — the brief includes it."); return; }
    setErr("");
    const profile = currentProfile();
    persist({ ...data, goalProfile: profile });
    const brief = buildCoachBrief(data, profile);
    try {
      await navigator.clipboard.writeText(brief);
      setCopyMsg("Copied — paste it into any Claude chat.");
    } catch (e) {
      // fallback for older webviews
      const ta = document.createElement("textarea");
      ta.value = brief; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); setCopyMsg("Copied — paste it into any Claude chat."); }
      catch (e2) { setCopyMsg("Couldn't access the clipboard on this device."); }
      document.body.removeChild(ta);
    }
    setTimeout(() => setCopyMsg(""), 4000);
  };

  const openInClaude = () => {
    if (!goalText.trim()) { setErr("Describe your goal first — the brief includes it."); return; }
    setErr("");
    const profile = currentProfile();
    persist({ ...data, goalProfile: profile });
    const brief = buildCoachBrief(data, profile);
    const url = "https://claude.ai/new?q=" + encodeURIComponent(brief);
    if (url.length > 7500) {
      copyBrief();
      setCopyMsg("Brief too long for a link — copied to clipboard instead. Paste into Claude.");
      setTimeout(() => setCopyMsg(""), 4000);
      return;
    }
    window.open(url, "_blank");
  };

  const applyPasted = () => {
    setErr(""); setApplied(false);
    try {
      const raw = extractPlanJson(pasted);
      const metrics = coachMetrics(data);
      const gated = applyCoachGates(raw, metrics, injury);
      setResult({ ...gated, assessment: gated.assessment || "Plan applied from pasted Claude reply.", pushback: gated.pushback || [], nutritionNote: gated.nutritionNote || "See Claude's reply for the reasoning.", nextCheckIn: gated.nextCheckIn || "Re-run a check-in in 2\u20134 weeks with fresh logs." });
      persist({
        ...data,
        goalProfile: currentProfile(),
        plan: { ...(data.plan || DEFAULT_PLAN), template: gated.template, sessionMin: gated.sessionMin, templateSince: todayISO() },
        focus: gated.focus,
        coachNote: { assessment: "Applied from pasted Claude plan.", gates: gated.gates, calorieDelta: gated.calorieDelta, at: new Date().toISOString() },
      });
      setApplied(true);
      setPasted("");
    } catch (e) {
      setErr("Couldn't parse a plan from that — paste Claude's full reply (it ends with a json block).");
    }
  };

  const saveKey = () => { localStorage.setItem(API_KEY_LS, apiKey.trim()); setShowSettings(false); setErr(""); };

  const run = async () => {
    setErr(""); setApplied(false);
    const key = localStorage.getItem(API_KEY_LS);
    if (!key) { setShowSettings(true); setErr("Add your Anthropic API key first (stored only on this device)."); return; }
    if (!goalText.trim()) { setErr("Describe your goal first — one or two sentences is enough."); return; }
    setBusy(true);
    try {
      const profile = { text: goalText.trim(), injuryRecovery: injury, updatedAt: new Date().toISOString() };
      const metrics = coachMetrics(data);
      const raw = await askCoachLLM(key, metrics, profile);
      const gated = applyCoachGates(raw, metrics, injury);
      setResult(gated);
      // save the goal profile immediately (plan applies only on user confirmation)
      persist({ ...data, goalProfile: profile });
    } catch (e) {
      setErr(e.message || "Analysis failed — try again.");
    }
    setBusy(false);
  };

  const applyPlan = () => {
    if (!result) return;
    persist({
      ...data,
      plan: { ...(data.plan || DEFAULT_PLAN), template: result.template, sessionMin: result.sessionMin, templateSince: todayISO() },
      focus: result.focus,
      coachNote: { assessment: result.assessment, pushback: result.pushback, gates: result.gates, calorieDelta: result.calorieDelta, nutritionNote: result.nutritionNote, nextCheckIn: result.nextCheckIn, at: new Date().toISOString() },
    });
    setApplied(true);
  };

  return (
    <div style={{ ...S.card, background: "#F0F7FF" }}>
      <div style={{ ...S.row, justifyContent: "space-between" }}>
        <span style={{ fontWeight: 800, fontSize: 16 }}>AI Coach</span>
        <button style={S.smallPill("transparent", C.blue)} onClick={() => setShowSettings(!showSettings)}>
          {showSettings ? "Hide settings" : "Settings"}
        </button>
      </div>

      {showSettings && (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.5, marginBottom: 8 }}>
            Paste an Anthropic API key (console.anthropic.com → API keys). Stored only on this device —
            never synced to the cloud. Each analysis costs about a cent.
          </div>
          <input style={{ ...S.input, marginBottom: 8 }} type="password" placeholder="sk-ant-..." value={apiKey}
            onChange={(e) => setApiKey(e.target.value)} />
          <button style={S.pillBtn()} onClick={saveKey}>Save key</button>
        </div>
      )}

      <div style={{ marginTop: 12 }}>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: C.sub, marginBottom: 6 }}>YOUR GOAL</div>
        <textarea
          style={{ ...S.input, minHeight: 64, resize: "vertical" }}
          placeholder="e.g., Capped shoulders and visible abs by summer. Coming back from a hip labral tear. 45 minutes, 4 days a week."
          value={goalText}
          onChange={(e) => setGoalText(e.target.value)}
        />
        <button
          style={{ ...S.smallPill(injury ? "#FFF1E5" : "#E9E9EB", injury ? C.orange : C.text), marginTop: 8 }}
          onClick={() => setInjury(!injury)}
        >
          {injury ? "Recovering from injury: ON (gate active)" : "Recovering from injury: OFF"}
        </button>
      </div>

      {!unlocked ? (
        <div style={{ marginTop: 14, background: "#F7F7FA", borderRadius: 12, padding: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>Coach unlocks after {UNLOCK_WEEKS} weeks of logs</div>
          <div style={{ background: "#E5E5EA", borderRadius: 999, height: 8, marginTop: 10, overflow: "hidden" }}>
            <div style={{ background: C.blue, height: 8, width: `${Math.min(100, Math.round((weeks / UNLOCK_WEEKS) * 100))}%`, borderRadius: 999 }} />
          </div>
          <div style={{ fontSize: 12.5, color: C.sub, marginTop: 8, lineHeight: 1.45 }}>
            {weeks} of {UNLOCK_WEEKS} weeks logged. Trends need ~3 weekly data points to mean anything —
            recommendations before that would be guesswork. Keep logging; the coach is quietly building your
            metrics in the background. You can write your goal above now so it's ready.
          </div>
        </div>
      ) : (
        <>
          <div style={{ ...S.row, marginTop: 12 }}>
            <button style={{ ...S.pillBtn(), flex: 1 }} onClick={copyBrief}>Copy coach prompt</button>
            <button style={{ ...S.pillBtn("#E9E9EB", C.text), flex: 1 }} onClick={openInClaude}>Open in Claude</button>
          </div>
          {copyMsg && <div style={{ color: C.green, fontSize: 13, marginTop: 8, fontWeight: 600 }}>{copyMsg}</div>}
          <div style={{ fontSize: 12, color: C.sub, marginTop: 8, lineHeight: 1.45 }}>
            Free path: the app packages your metrics, injury constraints, and the relevant research into a
            structured brief. Paste it into Claude, then paste Claude's reply below — the plan applies through
            the same safety gates.
          </div>
          <textarea
            style={{ ...S.input, minHeight: 60, resize: "vertical", marginTop: 10 }}
            placeholder="Paste Claude's full reply here to apply the plan…"
            value={pasted}
            onChange={(e) => setPasted(e.target.value)}
          />
          <button style={{ ...S.pillBtn(C.green), width: "100%", marginTop: 8 }} onClick={applyPasted}>
            Apply pasted plan
          </button>
          <button style={{ ...S.pillBtn(busy ? "#8E8E93" : "#E9E9EB", busy ? "#fff" : C.text), width: "100%", marginTop: 8 }} disabled={busy} onClick={run}>
            {busy ? "Coach is analyzing your logs…" : "Run in-app check-in (optional · uses your API key)"}
          </button>
        </>
      )}
      {err && <div style={{ color: C.red, fontSize: 13, marginTop: 8, lineHeight: 1.4 }}>{err}</div>}

      {result && (
        <div style={{ marginTop: 14 }}>
          {result.gates.length > 0 && (
            <div style={{ background: "#FFF7EC", borderRadius: 12, padding: 12, marginBottom: 10 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: C.orange }}>Safety gate applied</div>
              {result.gates.map((g, i) => (
                <div key={i} style={{ fontSize: 13, color: "#3A3A3C", marginTop: 4, lineHeight: 1.5 }}>{g}</div>
              ))}
            </div>
          )}
          {result.pushback && result.pushback.length > 0 && (
            <div style={{ background: "#FDECEC", borderRadius: 12, padding: 12, marginBottom: 10 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: C.red }}>Coach pushback</div>
              {result.pushback.map((p, i) => (
                <div key={i} style={{ fontSize: 13, color: "#3A3A3C", marginTop: 4, lineHeight: 1.5 }}>{p}</div>
              ))}
            </div>
          )}
          <div style={{ fontSize: 13, color: "#3A3A3C", lineHeight: 1.55 }}>{result.assessment}</div>
          <div style={{ fontSize: 13, marginTop: 8 }}>
            <b>Plan:</b> {TEMPLATES.find((t) => t.key === result.template)?.name} · {result.sessionMin} min ·{" "}
            {Object.entries(result.focus).filter(([, v]) => v !== "normal").map(([g, v]) => `${MUSCLE_GROUPS[g]?.name || g} ${v}`).join(", ") || "all normal"}
          </div>
          <div style={{ fontSize: 13, marginTop: 6 }}>
            <b>Nutrition:</b> {result.calorieDelta === 0 ? "hold current target" : `${result.calorieDelta > 0 ? "+" : ""}${result.calorieDelta} kcal/day`} — {result.nutritionNote}
          </div>
          <div style={{ fontSize: 13, marginTop: 6 }}><b>Watch next:</b> {result.nextCheckIn}</div>
          <button style={{ ...S.pillBtn(applied ? C.green : C.blue), width: "100%", marginTop: 12 }} onClick={applyPlan}>
            {applied ? "Plan applied ✓" : "Apply this plan"}
          </button>
          <div style={{ fontSize: 12, color: C.sub, marginTop: 6, lineHeight: 1.4 }}>
            Applying sets your split, session length, and focus sliders in one tap. Your logs are untouched.
            Calorie changes: adjust manually in Fuel per the note above.
          </div>
        </div>
      )}
    </div>
  );
}

function Insights({ data, persist }) {
  const trained = ALL_KNOWN.filter((ex) => data.sessions.some((s) => s.exerciseId === ex.id));

  const bwSorted = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1));
  let bwInsight = null;
  if (bwSorted.length >= 4) {
    const half = Math.floor(bwSorted.length / 2);
    const avg = (arr) => arr.reduce((a, x) => a + x.lbs, 0) / arr.length;
    const early = avg(bwSorted.slice(0, half));
    const late = avg(bwSorted.slice(half));
    bwInsight = { delta: late - early, late };
  }

  const weeksLogged = new Set(data.sessions.map((s) => weekStart(s.date))).size;
  const sessionsPerWeek = weeksLogged ? (data.sessions.length / weeksLogged).toFixed(1) : 0;

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Insights</h1>
        <div style={S.sub}>Trend analysis and your next targets, from your own data.</div>
      </header>

      <CoachCard data={data} persist={persist} />

      {trained.length === 0 && (
        <div style={{ ...S.card, color: C.sub, fontSize: 14 }}>
          Insights unlock after a couple of weeks of logging. The engine compares weekly best estimated
          1RMs, flags what's moving, and recommends the next weight for each lift.
        </div>
      )}

      {bwInsight && (
        <div style={S.card}>
          <div style={{ ...S.row, justifyContent: "space-between" }}>
            <span style={{ fontWeight: 700, fontSize: 15 }}>Scale trend</span>
            <span style={S.tag(
              bwInsight.delta <= 0 ? "#E8F8EE" : "#FFF1E5",
              bwInsight.delta <= 0 ? C.green : C.orange
            )}>
              {bwInsight.delta <= 0 ? "On track" : "Check intake"}
            </span>
          </div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 8, lineHeight: 1.5 }}>
            Average weight {bwInsight.delta <= 0 ? "down" : "up"} {Math.abs(bwInsight.delta).toFixed(1)} lb
            (recent average {bwInsight.late.toFixed(1)} lb). Target pace is −0.5 to −0.75 lb/week —
            faster than −1 lb/week for 2+ weeks means add ~150 kcal to protect muscle.
          </div>
        </div>
      )}

      {trained.map((ex) => {
        const series = weeklySeries(data.sessions, ex.id);
        const t = trendPct(series);
        const scheme = { repMin: ex.repMin || 8, repMax: ex.repMax || 12 };
        const rec = recommend({ ...ex, ...scheme }, data.sessions);
        return (
          <div key={ex.id} style={S.card}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 15 }}>{ex.name}</span>
              {t && (
                <span style={S.tag(
                  t.pct >= 0 ? "#E8F8EE" : "#FDECEC",
                  t.pct >= 0 ? C.green : C.red
                )}>
                  {t.pct >= 0 ? "+" : ""}{t.pct.toFixed(1)}% / {t.weeks} wk
                </span>
              )}
            </div>
            <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 8, lineHeight: 1.5 }}>
              {t
                ? `Estimated 1RM ${t.pct >= 0 ? "up" : "down"} ${Math.abs(t.pct).toFixed(1)}% over the last ${t.weeks} week${t.weeks > 1 ? "s" : ""}. `
                : "One week logged — trend appears after week two. "}
              {rec.note}
            </div>
            <div style={{ ...S.row, marginTop: 10, color: C.blue, fontWeight: 700, fontSize: 14 }}>
              Next: {rec.weight === 0 ? "bodyweight" : `${rec.weight} lb${ex.perHand ? "/hand" : ""}`} × {scheme.repMin}–{scheme.repMax}
              <ChevronRight size={16} />
            </div>
          </div>
        );
      })}

      {data.sessions.length > 0 && (
        <div style={{ ...S.card, background: "#EAF3FF" }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>Consistency</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
            {data.sessions.length} sessions across {weeksLogged} week{weeksLogged !== 1 ? "s" : ""} (~{sessionsPerWeek}/week).
            The research is blunt on this one: 4 quality days a week, sustained, beats any program tweak.
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ FOCUS (emphasis sliders) ============================ */

function Focus({ data, persist }) {
  const focus = data.focus || DEFAULT_FOCUS;
  const setLevel = (group, key) => persist({ ...data, focus: { ...focus, [group]: key } });

  const tally = weeklySetsByGroup(data);
  const specialized = Object.values(focus).filter((v) => v === "specialize").length;
  const emphasized = Object.values(focus).filter((v) => v === "emphasize" || v === "specialize").length;

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Focus</h1>
        <div style={S.sub}>Dial up a body part and the program shifts sets toward it — automatically.</div>
      </header>

      {(() => {
        const plan = data.plan || DEFAULT_PLAN;
        const rec = recommendTemplate(focus);
        const setPlan = (patch) => persist({ ...data, plan: { ...plan, ...patch } });
        const legsMaintained = focus.legs === "maintain";
        const upperHeavy = plan.template === "upperFocus" || plan.template === "superhero";
        return (
          <>
            <div style={S.card}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Weekly split</div>
              <div style={{ fontSize: 12.5, color: C.sub, marginBottom: 12 }}>
                The engine recommends a split from your emphasis settings below. You always choose.
              </div>
              {TEMPLATES.map((t) => {
                const active = plan.template === t.key;
                const recommended = rec.key === t.key;
                return (
                  <button
                    key={t.key}
                    onClick={() => persist({ ...data, plan: { ...plan, template: t.key, templateSince: todayISO() } })}
                    style={{
                      ...font, display: "block", width: "100%", textAlign: "left", cursor: "pointer",
                      background: active ? "#EAF3FF" : "#F7F7FA",
                      border: active ? `1.5px solid ${C.blue}` : `1px solid ${C.line}`,
                      borderRadius: 14, padding: "12px 14px", marginBottom: 10,
                    }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                      <span style={{ fontWeight: 800, fontSize: 15, color: active ? C.blue : C.text }}>{t.name}</span>
                      {recommended && <span style={S.tag("#E8F8EE", C.green)}>Recommended</span>}
                    </div>
                    <div style={{ fontSize: 12.5, color: C.sub, marginTop: 3 }}>{t.tagline}</div>
                    <div style={{ fontSize: 12.5, color: "#3A3A3C", marginTop: 6, lineHeight: 1.45 }}>{t.desc}</div>
                  </button>
                );
              })}
              <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.45, marginTop: 2 }}>
                <b style={{ color: C.blue }}>Why:</b> {rec.why}
              </div>
            </div>

            <div style={S.card}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Session length</div>
              <div style={{ fontSize: 12.5, color: C.sub, marginBottom: 10 }}>
                Days auto-fit your time: sets are trimmed from non-focused isolation work first;
                compounds and your focused muscles are protected.
              </div>
              <div style={S.row}>
                {[45, 60, 75].map((m) => (
                  <button key={m} style={S.chip(plan.sessionMin === m)} onClick={() => setPlan({ sessionMin: m })}>
                    {m === 75 ? "75+ min" : `${m} min`}
                  </button>
                ))}
              </div>
            </div>

            {upperHeavy && (
              <div style={{ ...S.card, borderLeft: `4px solid ${C.blue}` }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>Why there's still a leg day</div>
                <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
                  The research is clear on this one: training a muscle zero times per week lets it slowly
                  detrain, while a small "maintenance dose" (roughly a third of normal volume, once weekly)
                  retains what you've built. Skipping legs entirely also hurts overall physique balance and
                  costs you the systemic stimulus of big lower-body lifts. So every split here keeps one
                  lower day — upper-emphasis means legs are <b>maintained</b>, never abandoned. Superhero-sized
                  arms with medium legs is a legitimate choice; zero legs isn't one this app will program.
                </div>
              </div>
            )}
            {!legsMaintained && plan.template === "superhero" && (
              <div style={{ ...S.card, borderLeft: `4px solid ${C.orange}` }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: C.orange }}>Tip</div>
                <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
                  You're on the Superhero block but Legs isn't set to Maintain below — that stacks extra leg
                  sets onto a split designed to minimize them. Set Legs to Maintain to match the block's intent
                  (and to keep total fatigue recoverable while the hip rebuilds).
                </div>
              </div>
            )}
          </>
        );
      })()}

      {emphasized > 2 && (
        <div style={{ ...S.card, borderLeft: `4px solid ${C.orange}` }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: C.orange }}>Spreading yourself thin</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
            You've emphasized {emphasized} areas. Specialization works best on 1–2 at a time — everything
            can't be a priority, because recovery is finite. For a shoulders-and-arms build, set those two to
            Emphasize/Specialize and pull legs, chest, or back to Maintain to free up recovery.
          </div>
        </div>
      )}

      {Object.entries(MUSCLE_GROUPS).map(([g, def]) => {
        const level = focus[g] || "normal";
        const sets = tally[g] || 0;
        const status =
          sets < def.mev ? { txt: "below growth range", c: C.orange }
          : sets > def.mav ? { txt: "above typical recoverable", c: C.red }
          : { txt: "in the productive range", c: C.green };
        return (
          <div key={g} style={S.card}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>{def.name}</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: status.c }}>
                {sets} sets/wk
              </span>
            </div>
            <div style={{ fontSize: 12, color: status.c, marginTop: 2 }}>
              {status.txt} · target {def.mev}–{def.mav}
            </div>

            <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
              {EMPHASIS_LEVELS.map((lvl) => (
                <button
                  key={lvl.key}
                  onClick={() => setLevel(g, lvl.key)}
                  style={{
                    ...font, flex: 1, padding: "9px 4px", borderRadius: 10, border: "none", cursor: "pointer",
                    fontSize: 12.5, fontWeight: 700,
                    background: level === lvl.key ? C.blue : "#E9E9EB",
                    color: level === lvl.key ? "#fff" : C.text,
                  }}
                >
                  {lvl.label}
                </button>
              ))}
            </div>
          </div>
        );
      })}

      <div style={{ ...S.card, background: "#EAF3FF" }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>How this works</div>
        <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.55 }}>
          Muscles grow roughly in proportion to weekly hard sets, up to a recoverable ceiling. Emphasize adds
          sets to a body part (and, at Specialize, unlocks a bonus exercise for it); Maintain trims a body part
          back to a holding dose so the extra work stays recoverable. The set counts above update live and flag
          when a muscle drops below its growth range or climbs past what's typically recoverable. Progression,
          rep ranges, and your hip guardrails are unchanged.
        </div>
      </div>
    </div>
  );
}

/* ============================ FUEL (nutrition) ============================ */

function Fuel({ data, persist }) {
  const n = data.nutrition || DEFAULT_NUTRITION;
  const latestBw = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1)).slice(-1)[0]?.lbs;
  const out = computeNutrition(n, latestBw);

  const setN = (patch) => persist({ ...data, nutrition: { ...n, ...patch } });

  const bwSorted = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1));
  let paceNote = null;
  if (bwSorted.length >= 6) {
    const half = Math.floor(bwSorted.length / 2);
    const avg = (arr) => arr.reduce((a, x) => a + x.lbs, 0) / arr.length;
    const delta = avg(bwSorted.slice(half)) - avg(bwSorted.slice(0, half));
    if (delta < -1.5) paceNote = { text: `Scale trend is dropping fast (${delta.toFixed(1)} lb between averaging periods). Add ~150 kcal to protect muscle: try ${out.target + 150}.`, color: C.orange };
    else if (delta > 0.5) paceNote = { text: `Scale trend is up ${delta.toFixed(1)} lb. Hold the target for another week, then subtract 150 kcal if still flat or rising: ${out.target - 150}.`, color: C.orange };
    else paceNote = { text: "Scale pace looks right for recomposition. No change needed.", color: C.green };
  }

  const stepOptions = [4000, 7000, 10000, 13000];
  const workoutOptions = [3, 4, 5];

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Fuel</h1>
        <div style={S.sub}>Calorie target from your body stats and real activity level.</div>
      </header>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>About you</div>

        <div style={{ ...S.row, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Age</div>
            <input style={S.input} type="number" inputMode="numeric" value={n.age}
              onChange={(e) => setN({ age: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Height (in)</div>
            <input style={S.input} type="number" inputMode="numeric" value={n.heightIn}
              onChange={(e) => setN({ heightIn: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Weight</div>
            <div style={{ ...S.input, background: "#F0F0F3", color: C.sub }}>{out.lbs} lb</div>
          </div>
        </div>
        <div style={{ fontSize: 12, color: C.sub, marginBottom: 14 }}>
          Weight auto-fills from your latest Log entry.
        </div>

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Do you sit most of the day for work?</div>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <button style={S.chip(n.deskJob)} onClick={() => setN({ deskJob: true })}>Desk job</button>
          <button style={S.chip(!n.deskJob)} onClick={() => setN({ deskJob: false })}>On my feet</button>
        </div>

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Steps per day (typical)</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          {stepOptions.map((s) => (
            <button key={s} style={S.chip(Number(n.steps) === s)} onClick={() => setN({ steps: s })}>
              {s >= 1000 ? `${s / 1000}k` : s}
            </button>
          ))}
        </div>
        <input style={{ ...S.input, marginBottom: 14 }} type="number" inputMode="numeric"
          placeholder="or exact steps" value={n.steps} onChange={(e) => setN({ steps: e.target.value })} />

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Lifting sessions per week</div>
        <div style={S.row}>
          {workoutOptions.map((w) => (
            <button key={w} style={S.chip(Number(n.workouts) === w)} onClick={() => setN({ workouts: w })}>
              {w} days
            </button>
          ))}
        </div>
      </div>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>Your numbers</div>
        <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
          <div style={{ flex: 1, background: "#F7F7FA", borderRadius: 14, padding: 14 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600 }}>Maintenance</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5 }}>{out.tdee.toLocaleString()}</div>
            <div style={{ fontSize: 12, color: C.sub }}>kcal / day</div>
          </div>
          <div style={{ flex: 1, background: "#EAF3FF", borderRadius: 14, padding: 14 }}>
            <div style={{ fontSize: 12, color: C.blue, fontWeight: 700 }}>Recomp target</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5, color: C.blue }}>{out.target.toLocaleString()}</div>
            <div style={{ fontSize: 12, color: C.sub }}>kcal / day (−350)</div>
          </div>
        </div>

        <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 12, lineHeight: 1.55 }}>
          Breakdown: BMR {out.bmr.toLocaleString()} kcal, {n.deskJob ? "desk-job" : "active-job"} baseline,
          + ~{out.stepsKcal} kcal from steps + ~{out.trainKcal} kcal/day averaged from {n.workouts} lifting sessions.
          Protein stays at <b>120–130 g/day</b> regardless of the calorie number. Optional: eat ~150 above target on
          training days and ~150 below on rest days — same weekly total, better session energy.
        </div>
      </div>

      {paceNote && (
        <div style={{ ...S.card, borderLeft: `4px solid ${paceNote.color}` }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>Auto-adjustment</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>{paceNote.text}</div>
        </div>
      )}
      {!paceNote && (
        <div style={{ ...S.card, color: C.sub, fontSize: 13, lineHeight: 1.5 }}>
          Once you've logged ~6 body-weight entries, this tab starts checking your actual rate of loss
          against the −0.5 to −0.75 lb/week target and tells you when to adjust calories up or down.
        </div>
      )}
    </div>
  );
}

      });
