/* ===== Emphasis model (research-driven set redistribution) =====
   Weekly hard sets per muscle is the primary driver of regional growth. Each
   group has a maintenance floor (mv), a minimum effective dose for growth (mev),
   and an approximate recoverable ceiling (mav). Emphasis sliders scale the sets
   assigned to a group's exercises; the Focus tab tallies the result live. */
const MUSCLE_GROUPS = {
  shoulders: { name: "Shoulders", cats: ["vpress", "delts"], mv: 6, mev: 8, mav: 22 },
  arms:      { name: "Arms",      cats: ["biceps", "triceps"], mv: 6, mev: 8, mav: 24 },

  core:      { name: "Core",      cats: ["core"], mv: 0, mev: 6, mav: 16 },
};
const CAT_TO_GROUP = {};
Object.entries(MUSCLE_GROUPS).forEach(([g, def]) => def.cats.forEach((c) => { CAT_TO_GROUP[c] = g; }));

const EMPHASIS_LEVELS = [
  { key: "maintain", label: "Maintain", mult: 0.55 },
  { key: "normal", label: "Normal", mult: 1.0 },
  { key: "emphasize", label: "Emphasize", mult: 1.4 },
  { key: "specialize", label: "Specialize", mult: 1.85 },
];

/* Bonus exercises unlocked when a group is set to Specialize. Injected into the

const BONUS = [
  { group: "shoulders", dayId: "upperB", ex: { id: "bonus_sidelat", name: "Cable Lateral Raise (high-rep)", cat: "delts", repMin: 15, repMax: 20, start: 10, inc: 2.5 } },
  { group: "shoulders", dayId: "upperA", ex: { id: "bonus_reardelt", name: "Reverse Pec-Deck (rear delt)", cat: "delts", repMin: 12, repMax: 20, start: 40, inc: 5 } },
  { group: "arms", dayId: "upperA", ex: { id: "bonus_ohtri", name: "Overhead Cable Triceps Ext.", cat: "triceps", repMin: 10, repMax: 15, start: 30, inc: 5 } },

];
const BONUS_EX = BONUS.map((b) => b.ex);

BONUS_EX.forEach((b) => { if (!EX_BY_ID[b.id]) { ALL_KNOWN.push(b); EX_BY_ID[b.id] = b; } });

function emphasisMult(cat, focus) {
  const g = CAT_TO_GROUP[cat];
  if (!g || !focus || !focus[g]) return 1;
  const lvl = EMPHASIS_LEVELS.find((l) => l.key === focus[g]);
  return lvl ? lvl.mult : 1;
}
/* Scale a slot's base set count by its muscle's emphasis, clamped so it never
   disappears or balloons past a sane per-exercise cap. */
function adjustSets(baseSets, cat, focus) {
  const m = emphasisMult(cat, focus);
  return Math.max(1, Math.min((baseSets || 3) + 3, Math.round((baseSets || 3) * m)));
}
/* Which bonus exercises are active for a given day, based on Specialize focus. */
function bonusForDay(dayId, focus) {
  if (!focus) return [];
  return BONUS.filter((b) => b.dayId === dayId && focus[b.group] === "specialize")
    .map((b) => ({ ...b.ex, sets: 3, slotId: b.ex.id, swapped: false, isBonus: true }));
}
/* Live weekly-set tally per muscle group across the whole program + bonuses. */
function weeklySetsByGroup(data) {
  const focus = data.focus || DEFAULT_FOCUS;
  const t = {};
  PROGRAM.forEach((day) => {
    day.exercises.forEach((slot) => {
      const ex = resolveSlot(slot, data.swaps, focus);
      const g = CAT_TO_GROUP[ex.cat];
      if (g) t[g] = (t[g] || 0) + ex.sets;
    });
    bonusForDay(day.id, focus).forEach((b) => {
      const g = CAT_TO_GROUP[b.cat];
      if (g) t[g] = (t[g] || 0) + b.sets;
    });
  });
  return t;
}

/* ============================ HELPERS ============================ */

const e1rm = (w, r) => (r >= 1 ? (w === 0 ? r : w * (1 + r / 30)) : 0);
const round5 = (x) => Math.max(5, Math.round(x / 5) * 5);

function weekStart(dateISO) {
  const d = new Date(dateISO + "T12:00:00");
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0, 10);
}
const shortDate = (iso) =>
  new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const todayISO = () => new Date().toISOString().slice(0, 10);

function bestSet(sets) {
  let best = null;
  for (const s of sets) {
    const v = e1rm(Number(s.w) || 0, Number(s.r) || 0);
    if (!best || v > best.v) best = { ...s, v };
  }
  return best;
}

function weeklySeries(sessions, exId) {
  const byWeek = {};
  const mine = sessions.filter((s) => s.exerciseId === exId);
  mine.forEach((s) => {
    const wk = weekStart(s.date);
    const b = bestSet(s.sets);
    if (!b) return;
    if (!byWeek[wk] || b.v > byWeek[wk].e1) {
      byWeek[wk] = { ...(byWeek[wk] || {}), week: wk, e1: b.v, topW: Number(b.w) || 0, topR: Number(b.r) || 0 };
    }
  });
  mine.forEach((s) => {
    const wk = weekStart(s.date);
    const vol = s.sets.reduce((a, x) => a + (Number(x.w) || 0) * (Number(x.r) || 0), 0);
    if (byWeek[wk]) byWeek[wk].vol = (byWeek[wk].vol || 0) + vol;
  });
  return Object.values(byWeek).sort((a, b) => (a.week < b.week ? -1 : 1));
}

/* Resolve a program slot through any active swap. The resolved exercise keeps
   the slot's set/rep scheme so the day's structure is preserved. */
function resolveSlot(slot, swaps, focus) {
  const swapId = swaps && swaps[slot.id];
  const base = (!swapId || !EX_BY_ID[swapId])
    ? { ...slot, slotId: slot.id, swapped: false }
    : { ...EX_BY_ID[swapId], repMin: slot.repMin, repMax: slot.repMax,
        slotId: slot.id, swapped: true, originalName: slot.name };
  // Emphasis scales the number of working sets for this exercise's muscle.
  const baseSets = slot.sets;
  base.sets = focus ? adjustSets(baseSets, base.cat, focus) : baseSets;
  base.baseSets = baseSets;
  return base;
}

/* Working weight = heaviest weight used in the most recent session of a lift */
function lastWorkingWeight(sessions, exId) {
  const hist = sessions.filter((s) => s.exerciseId === exId).sort((a, b) => (a.date < b.date ? -1 : 1));
  if (!hist.length) return null;
  return Math.max(...hist[hist.length - 1].sets.map((s) => Number(s.w) || 0));
}

/* Recommendation engine: double progression, plus cross-lift estimation for
   exercises you haven't logged yet (used when swapping something new in). */
function recommend(ex, sessions) {
  const hist = sessions
    .filter((s) => s.exerciseId === ex.id)
    .sort((a, b) => (a.date < b.date ? -1 : 1));

  if (hist.length === 0) {
    if (ex.basedOn) {
      const refW = lastWorkingWeight(sessions, ex.basedOn.ex);
      if (refW) {
        const refName = EX_BY_ID[ex.basedOn.ex]?.name || "a related lift";
        return {
          weight: round5(refW * ex.basedOn.ratio),
          tag: "Estimated",
          note: `Estimated from your ${refName} (${refW} lb). Treat set 1 as a feeler and adjust.`,
        };
      }
    }
    return {
      weight: ex.start,
      tag: "Start",
      note: ex.start === 0
        ? "Bodyweight to begin. Add load once you clear the top of the rep range."
        : "Conservative starting weight. Should feel easy — that's the point.",
    };
  }

  const last = hist[hist.length - 1];
  const reps = last.sets.map((s) => Number(s.r) || 0);
  const w = Math.max(...last.sets.map((s) => Number(s.w) || 0));
  const allTop = reps.length > 0 && reps.every((r) => r >= ex.repMax);
  const anyBelow = reps.some((r) => r > 0 && r < ex.repMin);
  const inc = ex.inc ?? 5;
  if (allTop && inc > 0) {
    return { weight: w + inc, tag: "Add weight", note: `You hit ${ex.repMax}+ reps on every set at ${w} lb. Move up.` };
  }
  if (anyBelow) {
    return { weight: w, tag: "Hold", note: `Some sets fell under ${ex.repMin} reps. Stay at ${w} lb and build reps.` };
  }
  return { weight: w, tag: "Add reps", note: `Same weight (${w} lb) — aim for +1 rep per set toward ${ex.repMax}.` };
}

function trendPct(series) {
  if (series.length < 2) return null;
  const recent = series.slice(-4);
  const first = recent[0].e1, last = recent[recent.length - 1].e1;
  if (!first) return null;
  return { pct: ((last - first) / first) * 100, weeks: recent.length - 1 };
}


/* Rest recommendations: heavier compounds recover better with 2–3 min
   (rest-interval literature favors >=2 min for hypertrophy on big lifts);
   isolation work is productive at 60–90 s. */
function restFor(ex) {
  if (["squat", "hinge", "glute"].includes(ex.cat)) return { sec: 180, label: "2–3 min" };
  if (["hpress", "vpress", "hpull", "vpull"].includes(ex.cat)) return { sec: 120, label: "~2 min" };
  return { sec: 90, label: "60–90 s" };
}

function dayDurationMin(day, swaps, focus) {
  let total = 0;
  day.exercises.forEach((slot) => {
    const ex = resolveSlot(slot, swaps, focus);
    total += ex.sets * (40 + restFor(ex).sec);
  });
  return Math.round(total / 60 / 5) * 5;
}

/* Nutrition math: Mifflin-St Jeor BMR + additive activity model
   (base occupational multiplier + step count + training sessions). */
function computeNutrition(n, latestBw) {
  const lbs = latestBw || 146;
  const kg = lbs / 2.2046;
  const cm = (Number(n.heightIn) || 67) * 2.54;
  const age = Number(n.age) || 35;
  const bmr = Math.round(10 * kg + 6.25 * cm - 5 * age + (n.sex === "female" ? -161 : 5));
  const baseMult = n.deskJob ? 1.1 : 1.28;
  const stepsKcal = (Number(n.steps) || 0) * 0.045 * (lbs / 150);
  const trainKcal = ((Number(n.workouts) || 0) * 300) / 7;
  const tdee = Math.round(bmr * baseMult + stepsKcal + trainKcal);
  const target = Math.round((tdee - 350) / 10) * 10;
  return { lbs, bmr, tdee, target, stepsKcal: Math.round(stepsKcal), trainKcal: Math.round(trainKcal) };
}

/* ============================ APP ============================ */

function App() {
  const [tab, setTab] = useState("today");
  const [data, setData] = useState({ ...DEFAULT_DATA, focus: DEFAULT_FOCUS });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      let found = null;
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) found = JSON.parse(res.value);
      } catch (e) { /* no v2 data yet */ }
      if (!found) {
        try {
          const old = await window.storage.get(OLD_KEY);
          if (old && old.value) found = JSON.parse(old.value); // migrate v1 logs
        } catch (e) { /* no v1 data either */ }
      }
      if (found) {
        setData({
          ...DEFAULT_DATA, ...found,
          swaps: found.swaps || {},
          nutrition: { ...DEFAULT_NUTRITION, ...(found.nutrition || {}) },
          focus: { ...DEFAULT_FOCUS, ...(found.focus || {}) },
        });
      }
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {
    setData(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      console.error("Save failed", e);
    }
  };

  return (
    <div style={S.app}>
      {tab === "today" && <WorkoutFlow data={data} persist={persist} />}
      {tab === "log" && <Log data={data} persist={persist} loaded={loaded} />}
      {tab === "progress" && <Progress data={data} />}
      {tab === "insights" && <Insights data={data} />}
      {tab === "fuel" && <Fuel data={data} persist={persist} />}
      {tab === "focus" && <Focus data={data} persist={persist} />}

      <nav style={S.tabBar}>
        <TabBtn icon={Dumbbell} label="Workout" id="today" tab={tab} setTab={setTab} />
        <TabBtn icon={ClipboardList} label="Log" id="log" tab={tab} setTab={setTab} />
        <TabBtn icon={TrendingUp} label="Progress" id="progress" tab={tab} setTab={setTab} />
        <TabBtn icon={Target} label="Focus" id="focus" tab={tab} setTab={setTab} />
        <TabBtn icon={Sparkles} label="Insights" id="insights" tab={tab} setTab={setTab} />
        <TabBtn icon={Flame} label="Fuel" id="fuel" tab={tab} setTab={setTab} />
      </nav>
    </div>
  );
}

/* ============================ WORKOUT FLOW ============================ */
/* Day picker → day page → tap an exercise to log it inline, with rest timer */

function WorkoutFlow({ data, persist }) {
  const [dayId, setDayId] = useState(null);
  const day = dayId ? PROGRAM.find((d) => d.id === dayId) : null;

  if (!day) return <DayPicker data={data} onPick={setDayId} />;
  return <DayPage day={day} data={data} persist={persist} onBack={() => setDayId(null)} />;
}

function DayPicker({ data, onPick }) {
  const focus = {
    upperA: "Chest · back · shoulders · arms",
    lowerA: "Quads · hamstrings · calves · abs",
    upperB: "Shoulders · lats · chest · arms",
    lowerB: "Glutes · hinge · single-leg · core",
  };

  const lastDone = (day) => {
    const ids = day.exercises.map((slot) => resolveSlot(slot, data.swaps).id);
    const dates = data.sessions.filter((s) => ids.includes(s.exerciseId)).map((s) => s.date);
    return dates.length ? dates.sort().slice(-1)[0] : null;
  };

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Workout</h1>
        <div style={S.sub}>Which day are you on?</div>
      </header>

      {PROGRAM.map((d) => {
        const last = lastDone(d);
        return (
          <button
            key={d.id}
            onClick={() => onPick(d.id)}
            style={{
              ...S.card, ...font, display: "flex", justifyContent: "space-between",
              alignItems: "center", width: "calc(100% - 32px)", border: "none",
              cursor: "pointer", textAlign: "left",
            }}
          >
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, letterSpacing: -0.3 }}>{d.name}</div>
              <div style={{ color: C.sub, fontSize: 13, marginTop: 3 }}>{focus[d.id]}</div>
              <div style={{ color: C.sub, fontSize: 12.5, marginTop: 6 }}>
                {d.exercises.length} exercises · ~{dayDurationMin(d, data.swaps, data.focus)} min
                {last ? ` · last done ${shortDate(last)}` : " · not started yet"}
              </div>
            </div>
            <ChevronRight size={20} color={C.sub} />
          </button>
        );
      })}

      <div style={{ ...S.card, background: "#EAF3FF" }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>Suggested rhythm</div>
        <div style={{ fontSize: 13, lineHeight: 1.5, marginTop: 6, color: "#3A3A3C" }}>
          Upper A → Lower A → rest → Upper B → Lower B → weekend. But any order works —
          just don't run the two lower days back to back while the hip is rebuilding.
        </div>
      </div>
    </div>
  );
}

function DayPage({ day, data, persist, onBack }) {
  const [openId, setOpenId] = useState(null); // slotId with logging form open
  const today = todayISO();

  const loggedToday = (exId) =>
    data.sessions.find((s) => s.exerciseId === exId && s.date === today);

  return (
    <div>
      <header style={{ ...S.header, paddingBottom: 4 }}>
        <button
          onClick={onBack}
          style={{ ...S.smallPill("transparent", C.blue), padding: "4px 0", fontSize: 15, marginBottom: 4 }}
        >
          ‹ All days
        </button>
        <h1 style={S.h1}>{day.name}</h1>
        <div style={S.sub}>Tap an exercise to log your sets. Rest times shown per lift.</div>
      </header>

      {[...day.exercises, ...bonusForDay(day.id, data.focus)].map((slot) => (
        <ExerciseCard
          key={slot.id}
          slot={slot}
          data={data}
          persist={persist}
          open={openId === slot.id}
          onToggle={() => setOpenId(openId === slot.id ? null : slot.id)}

        />
      ))}

      <div style={{ ...S.card, background: "#EAF3FF" }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>Coach notes</div>
        <div style={{ fontSize: 13, lineHeight: 1.5, marginTop: 6, color: "#3A3A3C" }}>
          Warm up first: 5 min easy cardio, hip mobility, 2–3 ramp-up sets on the first lift.
          Squat: safety pins stay above parallel — the pins are your depth governor.
          Pain above 3/10 during or 24h after → drop that lift 20% next session.
        </div>
      </div>
    </div>
  );
}

function ExerciseCard({ slot, data, persist, open, onToggle, done }) {
  const ex = resolveSlot(slot, data.swaps, data.focus);
  const rec = recommend(ex, data.sessions);
  const rest = restFor(ex);
  const [sets, setSets] = useState(null);
  const [swapMode, setSwapMode] = useState(false);
  const [timer, setTimer] = useState(null);
  const [flash, setFlash] = useState(false);

  useEffect(() => {
    if (timer === null || timer <= 0) return;
    const t = setTimeout(() => setTimer(timer - 1), 1000);
    return () => clearTimeout(t);
  }, [timer]);

  // Prefill the form with the recommended weight when opened
  useEffect(() => {
    if (open && sets === null) {
      setSets(Array.from({ length: ex.sets }, () => ({ w: rec.weight === 0 ? "" : String(rec.weight), r: "" })));
    }
    if (!open) { setSets(null); setSwapMode(false); setTimer(null); }
  }, [open]); // eslint-disable-line

  const saveSession = () => {
    const clean = (sets || [])
      .map((s) => ({ w: Number(s.w) || 0, r: Number(s.r) || 0 }))
      .filter((s) => s.r > 0);
    if (clean.length === 0) return;
    const session = { id: Date.now(), date: todayISO(), exerciseId: ex.id, sets: clean };
    persist({ ...data, sessions: [...data.sessions, session] });
    setFlash(true);
    setTimeout(() => { setFlash(false); onToggle(); }, 900);
  };

  const setSwap = (newExId) => {
    const swaps = { ...data.swaps };
    if (newExId) swaps[slot.id] = newExId; else delete swaps[slot.id];
    persist({ ...data, swaps });
    setSwapMode(false);
    setSets(null); // re-prefill with the new exercise's recommendation
  };

  const alternates = [
    ...(ex.swapped ? [{ ...slot, isOriginal: true }] : []),
    ...ALL_KNOWN.filter((a) => a.cat === slot.cat && a.id !== ex.id && a.id !== slot.id),
  ];

  const tagStyle =
    rec.tag === "Add weight" ? S.tag("#E8F8EE", C.green)
    : rec.tag === "Hold" ? S.tag("#FFF1E5", C.orange)
    : rec.tag === "Start" || rec.tag === "Estimated" ? S.tag("#EAF3FF", C.blue)
    : S.tag("#F0F0F3", C.sub);

  const mmss = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  return (
    <div style={{ ...S.card, borderLeft: done ? `4px solid ${C.green}` : "none" }}>
      {/* Collapsed header — always visible, tap to open/close */}
      <button
        onClick={onToggle}
        style={{ ...font, display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", background: "transparent", border: "none", cursor: "pointer", textAlign: "left", padding: 0 }}
      >
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>
            {done && <span style={{ color: C.green }}>✓ </span>}{ex.name}
          </div>
          <div style={{ color: C.sub, fontSize: 13, marginTop: 3 }}>
            {ex.sets} × {ex.repMin}–{ex.repMax} at {rec.weight === 0 ? "BW" : `${rec.weight} lb${ex.perHand ? "/hand" : ""}`} · rest {rest.label}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={tagStyle}>{rec.tag}</span>
          <ChevronRight size={18} color={C.sub} style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform .15s" }} />
        </div>
      </button>

      {open && (
        <div style={{ marginTop: 14, borderTop: `1px solid ${C.line}`, paddingTop: 14 }}>
          <div style={{ color: C.sub, fontSize: 13, lineHeight: 1.45, marginBottom: 12 }}>{rec.note}</div>

          {(sets || []).map((s, i) => (
            <div key={i} style={{ ...S.row, marginBottom: 8 }}>
              <span style={{ width: 44, color: C.sub, fontSize: 13, fontWeight: 600 }}>Set {i + 1}</span>
              <input
                style={S.input} type="number" inputMode="decimal" placeholder="lbs"
                value={s.w} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, w: e.target.value } : x)))}
              />
              <input
                style={S.input} type="number" inputMode="numeric" placeholder="reps"
                value={s.r} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, r: e.target.value } : x)))}
              />
            </div>
          ))}

          <div style={{ ...S.row, marginTop: 4, flexWrap: "wrap", gap: 8 }}>
            <button style={S.smallPill()} onClick={() => setSets([...(sets || []), { w: rec.weight === 0 ? "" : String(rec.weight), r: "" }])}>
              <Plus size={13} /> Add set
            </button>
            <button style={S.smallPill(swapMode ? "#DCEBFF" : "#E9E9EB", swapMode ? C.blue : C.text)} onClick={() => setSwapMode(!swapMode)}>
              {swapMode ? <X size={13} /> : <Repeat size={13} />} {swapMode ? "Close" : "Swap"}
            </button>
            {timer === null ? (
              <button style={S.smallPill("#FFF1E5", C.orange)} onClick={() => setTimer(rest.sec)}>
                Start {rest.label} rest
              </button>
            ) : timer > 0 ? (
              <button style={S.smallPill("#FFF1E5", C.orange)} onClick={() => setTimer(null)}>
                Rest {mmss(timer)} · tap to skip
              </button>
            ) : (
              <button style={S.smallPill("#E8F8EE", C.green)} onClick={() => setTimer(null)}>
                Rest done — go
              </button>
            )}
          </div>

          {swapMode && (
            <div style={{ marginTop: 12, borderTop: `1px solid ${C.line}`, paddingTop: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 8 }}>
                {CAT_NAMES[slot.cat] || "Alternates"}
              </div>
              {alternates.map((alt) => {
                const preview = recommend(
                  { ...alt, sets: slot.sets, repMin: slot.repMin, repMax: slot.repMax },
                  data.sessions
                );
                return (
                  <button
                    key={alt.id}
                    onClick={() => setSwap(alt.isOriginal ? null : alt.id)}
                    style={{
                      ...font, display: "flex", justifyContent: "space-between", alignItems: "center",
                      width: "100%", background: "#F7F7FA", border: `1px solid ${C.line}`,
                      borderRadius: 12, padding: "10px 12px", marginBottom: 8, cursor: "pointer", textAlign: "left",
                    }}
                  >
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>
                        {alt.isOriginal ? `Back to program: ${alt.name}` : alt.name}
                      </div>
                      {alt.caution && (
                        <div style={{ fontSize: 12, color: C.orange, marginTop: 2 }}>{alt.caution}</div>
                      )}
                    </div>
                    <div style={{ color: C.blue, fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", marginLeft: 8 }}>
                      {preview.weight === 0 ? "BW" : `${preview.weight} lb`}
                    </div>
                  </button>
                );
              })}
            </div>
          )}

          <button
            style={{ ...S.pillBtn(flash ? C.green : C.blue), width: "100%", marginTop: 12 }}
            onClick={saveSession}
          >
            {flash ? "Saved ✓" : "Save session"}
          </button>
        </div>
      )}
    </div>
  );
}

          <input
            style={S.input} type="number" inputMode="decimal" placeholder="lbs (e.g., 146.2)"
            value={bw} onChange={(e) => setBw(e.target.value)}
          />
          <button style={S.pillBtn()} onClick={saveWeight}>Save</button>
        </div>
      </div>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Log a lift</div>
        <select
          style={{ ...S.input, appearance: "none", marginBottom: 12 }}
          value={exId} onChange={(e) => setExId(e.target.value)}
        >
          {resolvedProgram.map((d) => (
            <optgroup key={d.id} label={d.name}>
              {d.exercises.map((ex) => (
                <option key={ex.slotId} value={ex.id}>{ex.name}</option>
              ))}
            </optgroup>
          ))}
          {extraLogged.length > 0 && (
            <optgroup label="Previously logged">
              {extraLogged.map((ex) => (
                <option key={ex.id} value={ex.id}>{ex.name}</option>
              ))}
            </optgroup>
          )}
        </select>

        {sets.map((s, i) => (
          <div key={i} style={{ ...S.row, marginBottom: 8 }}>
            <span style={{ width: 44, color: C.sub, fontSize: 13, fontWeight: 600 }}>Set {i + 1}</span>
            <input
              style={S.input} type="number" inputMode="decimal" placeholder="lbs"
              value={s.w} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, w: e.target.value } : x)))}
            />
            <input
              style={S.input} type="number" inputMode="numeric" placeholder="reps"
              value={s.r} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, r: e.target.value } : x)))}
            />
          </div>
        ))}

        <div style={{ ...S.row, marginTop: 12 }}>
          <button
            style={S.pillBtn("#E9E9EB", C.text)}
            onClick={() => setSets([...sets, { w: "", r: "" }])}
          >
            <Plus size={14} style={{ verticalAlign: -2 }} /> Add set
          </button>
          <button style={{ ...S.pillBtn(), flex: 1 }} onClick={saveSession}>
            Save session
          </button>
        </div>
      </div>

      <div style={{ padding: "8px 20px 0", fontWeight: 700, fontSize: 15 }}>Recent sessions</div>
      {recent.length === 0 && (
        <div style={{ ...S.card, color: C.sub, fontSize: 14 }}>
          No sessions yet. Log your first workout above — the Today tab will start adapting your weights from it.
        </div>
      )}
      {recent.map((s) => (
        <div key={s.id} style={{ ...S.card, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14 }}>{EX_BY_ID[s.exerciseId]?.name || s.exerciseId}</div>
            <div style={{ color: C.sub, fontSize: 13, marginTop: 2 }}>
              {shortDate(s.date)} · {s.sets.map((x) => `${x.w || "BW"}×${x.r}`).join("  ")}
            </div>
          </div>
          <button
            style={{ background: "transparent", border: "none", cursor: "pointer", color: C.red }}
            onClick={() => deleteSession(s.id)} aria-label="Delete session"
          >
            <Trash2 size={18} />
          </button>
        </div>
      ))}
    </div>
  );
}

/* ============================ PROGRESS ============================ */

function Progress({ data }) {
  const trained = ALL_KNOWN.filter((ex) => data.sessions.some((s) => s.exerciseId === ex.id));
  const [exId, setExId] = useState(null);
  const activeId = exId || (trained[0] && trained[0].id);
  const ex = activeId ? EX_BY_ID[activeId] : null;

  const series = useMemo(
    () => (activeId ? weeklySeries(data.sessions, activeId) : []),
    [data.sessions, activeId]
  );
  const chartData = series.map((s) => ({ name: shortDate(s.week), e1RM: Math.round(s.e1 * 10) / 10 }));

  const bwSorted = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1));
  const bwChart = bwSorted.map((w) => ({ name: shortDate(w.date), lbs: w.lbs }));

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Progress</h1>
        <div style={S.sub}>Weekly best estimated 1RM per lift, plus your scale trend.</div>
      </header>

      {trained.length === 0 ? (
        <div style={{ ...S.card, color: C.sub, fontSize: 14 }}>
          Charts appear after your first logged session.
        </div>
      ) : (
        <>
          <div style={{ display: "flex", gap: 8, padding: "8px 16px", overflowX: "auto" }}>
            {trained.map((t) => (
              <button key={t.id} style={S.chip(t.id === activeId)} onClick={() => setExId(t.id)}>
                {t.name.split(" (")[0]}
              </button>
            ))}
          </div>

          <div style={S.card}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>{ex.name}</div>
            <div style={{ color: C.sub, fontSize: 13, marginBottom: 10 }}>Estimated 1RM by week (lb)</div>
            <div style={{ width: "100%", height: 200 }}>
              <ResponsiveContainer>
                <LineChart data={chartData} margin={{ top: 6, right: 8, left: -18, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} vertical={false} />
                  <XAxis dataKey="name" tick={{ fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} domain={["auto", "auto"]} />
                  <Tooltip />
                  <Line type="monotone" dataKey="e1RM" stroke={C.blue} strokeWidth={2.5} dot={{ r: 3.5 }} />
                </LineChart>
              </ResponsiveContainer>
            </div>

            <table style={{ width: "100%", marginTop: 12, borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ color: C.sub, textAlign: "left" }}>
                  <th style={{ padding: "6px 0", fontWeight: 600 }}>Week of</th>
                  <th style={{ fontWeight: 600 }}>Top set</th>
                  <th style={{ fontWeight: 600 }}>Volume</th>
                  <th style={{ fontWeight: 600 }}>e1RM</th>
                </tr>
              </thead>
              <tbody>
                {series.map((s) => (
                  <tr key={s.week} style={{ borderTop: `1px solid ${C.line}` }}>
                    <td style={{ padding: "8px 0" }}>{shortDate(s.week)}</td>
                    <td>{s.topW || "BW"} × {s.topR}</td>
                    <td>{Math.round(s.vol || 0).toLocaleString()} lb</td>
                    <td style={{ fontWeight: 700 }}>{Math.round(s.e1)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Body weight</div>
        {bwChart.length === 0 ? (
          <div style={{ color: C.sub, fontSize: 13 }}>Log your weight in the Log tab to see the trend. Target: −0.5 to −0.75 lb per week.</div>
        ) : (
          <div style={{ width: "100%", height: 180 }}>
            <ResponsiveContainer>
              <LineChart data={bwChart} margin={{ top: 6, right: 8, left: -18, bottom: 0 }}>
                <CartesianGrid stroke={C.line} vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} domain={["auto", "auto"]} />
                <Tooltip />
                <Line type="monotone" dataKey="lbs" stroke={C.green} strokeWidth={2.5} dot={{ r: 3 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================ INSIGHTS ============================ */

function Insights({ data }) {
  const trained = ALL_KNOWN.filter((ex) => data.sessions.some((s) => s.exerciseId === ex.id));

  const bwSorted = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1));
  let bwInsight = null;
  if (bwSorted.length >= 4) {
    const half = Math.floor(bwSorted.length / 2);
    const avg = (arr) => arr.reduce((a, x) => a + x.lbs, 0) / arr.length;
    const early = avg(bwSorted.slice(0, half));
    const late = avg(bwSorted.slice(half));
    bwInsight = { delta: late - early, late };
  }

  const weeksLogged = new Set(data.sessions.map((s) => weekStart(s.date))).size;
  const sessionsPerWeek = weeksLogged ? (data.sessions.length / weeksLogged).toFixed(1) : 0;

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Insights</h1>
        <div style={S.sub}>Trend analysis and your next targets, from your own data.</div>
      </header>

      {trained.length === 0 && (
        <div style={{ ...S.card, color: C.sub, fontSize: 14 }}>
          Insights unlock after a couple of weeks of logging. The engine compares weekly best estimated
          1RMs, flags what's moving, and recommends the next weight for each lift.
        </div>
      )}

      {bwInsight && (
        <div style={S.card}>
          <div style={{ ...S.row, justifyContent: "space-between" }}>
            <span style={{ fontWeight: 700, fontSize: 15 }}>Scale trend</span>
            <span style={S.tag(
              bwInsight.delta <= 0 ? "#E8F8EE" : "#FFF1E5",
              bwInsight.delta <= 0 ? C.green : C.orange
            )}>
              {bwInsight.delta <= 0 ? "On track" : "Check intake"}
            </span>
          </div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 8, lineHeight: 1.5 }}>
            Average weight {bwInsight.delta <= 0 ? "down" : "up"} {Math.abs(bwInsight.delta).toFixed(1)} lb
            (recent average {bwInsight.late.toFixed(1)} lb). Target pace is −0.5 to −0.75 lb/week —
            faster than −1 lb/week for 2+ weeks means add ~150 kcal to protect muscle.
          </div>
        </div>
      )}

      {trained.map((ex) => {
        const series = weeklySeries(data.sessions, ex.id);
        const t = trendPct(series);
        const scheme = { repMin: ex.repMin || 8, repMax: ex.repMax || 12 };
        const rec = recommend({ ...ex, ...scheme }, data.sessions);
        return (
          <div key={ex.id} style={S.card}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 15 }}>{ex.name}</span>
              {t && (
                <span style={S.tag(
                  t.pct >= 0 ? "#E8F8EE" : "#FDECEC",
                  t.pct >= 0 ? C.green : C.red
                )}>
                  {t.pct >= 0 ? "+" : ""}{t.pct.toFixed(1)}% / {t.weeks} wk
                </span>
              )}
            </div>
            <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 8, lineHeight: 1.5 }}>
              {t
                ? `Estimated 1RM ${t.pct >= 0 ? "up" : "down"} ${Math.abs(t.pct).toFixed(1)}% over the last ${t.weeks} week${t.weeks > 1 ? "s" : ""}. `
                : "One week logged — trend appears after week two. "}
              {rec.note}
            </div>
            <div style={{ ...S.row, marginTop: 10, color: C.blue, fontWeight: 700, fontSize: 14 }}>
              Next: {rec.weight === 0 ? "bodyweight" : `${rec.weight} lb${ex.perHand ? "/hand" : ""}`} × {scheme.repMin}–{scheme.repMax}
              <ChevronRight size={16} />
            </div>
          </div>
        );
      })}

      {data.sessions.length > 0 && (
        <div style={{ ...S.card, background: "#EAF3FF" }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>Consistency</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
            {data.sessions.length} sessions across {weeksLogged} week{weeksLogged !== 1 ? "s" : ""} (~{sessionsPerWeek}/week).
            The research is blunt on this one: 4 quality days a week, sustained, beats any program tweak.
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ FOCUS (emphasis sliders) ============================ */

function Focus({ data, persist }) {
  const focus = data.focus || DEFAULT_FOCUS;
  const setLevel = (group, key) => persist({ ...data, focus: { ...focus, [group]: key } });

  const tally = weeklySetsByGroup(data);
  const specialized = Object.values(focus).filter((v) => v === "specialize").length;
  const emphasized = Object.values(focus).filter((v) => v === "emphasize" || v === "specialize").length;

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Focus</h1>
        <div style={S.sub}>Dial up a body part and the program shifts sets toward it — automatically.</div>
      </header>

      {emphasized > 2 && (
        <div style={{ ...S.card, borderLeft: `4px solid ${C.orange}` }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: C.orange }}>Spreading yourself thin</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>
            You've emphasized {emphasized} areas. Specialization works best on 1–2 at a time — everything
            can't be a priority, because recovery is finite. For a shoulders-and-arms build, set those two to
            Emphasize/Specialize and pull legs, chest, or back to Maintain to free up recovery.
          </div>
        </div>
      )}

      {Object.entries(MUSCLE_GROUPS).map(([g, def]) => {
        const level = focus[g] || "normal";
        const sets = tally[g] || 0;
        const status =
          sets < def.mev ? { txt: "below growth range", c: C.orange }
          : sets > def.mav ? { txt: "above typical recoverable", c: C.red }
          : { txt: "in the productive range", c: C.green };
        return (
          <div key={g} style={S.card}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>{def.name}</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: status.c }}>
                {sets} sets/wk
              </span>
            </div>
            <div style={{ fontSize: 12, color: status.c, marginTop: 2 }}>
              {status.txt} · target {def.mev}–{def.mav}
            </div>

            <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
              {EMPHASIS_LEVELS.map((lvl) => (
                <button
                  key={lvl.key}
                  onClick={() => setLevel(g, lvl.key)}
                  style={{
                    ...font, flex: 1, padding: "9px 4px", borderRadius: 10, border: "none", cursor: "pointer",
                    fontSize: 12.5, fontWeight: 700,
                    background: level === lvl.key ? C.blue : "#E9E9EB",
                    color: level === lvl.key ? "#fff" : C.text,
                  }}
                >
                  {lvl.label}
                </button>
              ))}
            </div>
          </div>
        );
      })}

      <div style={{ ...S.card, background: "#EAF3FF" }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>How this works</div>
        <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.55 }}>
          Muscles grow roughly in proportion to weekly hard sets, up to a recoverable ceiling. Emphasize adds
          sets to a body part (and, at Specialize, unlocks a bonus exercise for it); Maintain trims a body part
          back to a holding dose so the extra work stays recoverable. The set counts above update live and flag
          when a muscle drops below its growth range or climbs past what's typically recoverable. Progression,
          rep ranges, and your hip guardrails are unchanged.
        </div>
      </div>
    </div>
  );
}

/* ============================ FUEL (nutrition) ============================ */

function Fuel({ data, persist }) {
  const n = data.nutrition || DEFAULT_NUTRITION;
  const latestBw = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1)).slice(-1)[0]?.lbs;
  const out = computeNutrition(n, latestBw);

  const setN = (patch) => persist({ ...data, nutrition: { ...n, ...patch } });

  const bwSorted = [...data.weights].sort((a, b) => (a.date < b.date ? -1 : 1));
  let paceNote = null;
  if (bwSorted.length >= 6) {
    const half = Math.floor(bwSorted.length / 2);
    const avg = (arr) => arr.reduce((a, x) => a + x.lbs, 0) / arr.length;
    const delta = avg(bwSorted.slice(half)) - avg(bwSorted.slice(0, half));
    if (delta < -1.5) paceNote = { text: `Scale trend is dropping fast (${delta.toFixed(1)} lb between averaging periods). Add ~150 kcal to protect muscle: try ${out.target + 150}.`, color: C.orange };
    else if (delta > 0.5) paceNote = { text: `Scale trend is up ${delta.toFixed(1)} lb. Hold the target for another week, then subtract 150 kcal if still flat or rising: ${out.target - 150}.`, color: C.orange };
    else paceNote = { text: "Scale pace looks right for recomposition. No change needed.", color: C.green };
  }

  const stepOptions = [4000, 7000, 10000, 13000];
  const workoutOptions = [3, 4, 5];

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Fuel</h1>
        <div style={S.sub}>Calorie target from your body stats and real activity level.</div>
      </header>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>About you</div>

        <div style={{ ...S.row, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Age</div>
            <input style={S.input} type="number" inputMode="numeric" value={n.age}
              onChange={(e) => setN({ age: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Height (in)</div>
            <input style={S.input} type="number" inputMode="numeric" value={n.heightIn}
              onChange={(e) => setN({ heightIn: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 4 }}>Weight</div>
            <div style={{ ...S.input, background: "#F0F0F3", color: C.sub }}>{out.lbs} lb</div>
          </div>
        </div>
        <div style={{ fontSize: 12, color: C.sub, marginBottom: 14 }}>
          Weight auto-fills from your latest Log entry.
        </div>

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Do you sit most of the day for work?</div>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <button style={S.chip(n.deskJob)} onClick={() => setN({ deskJob: true })}>Desk job</button>
          <button style={S.chip(!n.deskJob)} onClick={() => setN({ deskJob: false })}>On my feet</button>
        </div>

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Steps per day (typical)</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          {stepOptions.map((s) => (
            <button key={s} style={S.chip(Number(n.steps) === s)} onClick={() => setN({ steps: s })}>
              {s >= 1000 ? `${s / 1000}k` : s}
            </button>
          ))}
        </div>
        <input style={{ ...S.input, marginBottom: 14 }} type="number" inputMode="numeric"
          placeholder="or exact steps" value={n.steps} onChange={(e) => setN({ steps: e.target.value })} />

        <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, marginBottom: 6 }}>Lifting sessions per week</div>
        <div style={S.row}>
          {workoutOptions.map((w) => (
            <button key={w} style={S.chip(Number(n.workouts) === w)} onClick={() => setN({ workouts: w })}>
              {w} days
            </button>
          ))}
        </div>
      </div>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>Your numbers</div>
        <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
          <div style={{ flex: 1, background: "#F7F7FA", borderRadius: 14, padding: 14 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600 }}>Maintenance</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5 }}>{out.tdee.toLocaleString()}</div>
            <div style={{ fontSize: 12, color: C.sub }}>kcal / day</div>
          </div>
          <div style={{ flex: 1, background: "#EAF3FF", borderRadius: 14, padding: 14 }}>
            <div style={{ fontSize: 12, color: C.blue, fontWeight: 700 }}>Recomp target</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5, color: C.blue }}>{out.target.toLocaleString()}</div>
            <div style={{ fontSize: 12, color: C.sub }}>kcal / day (−350)</div>
          </div>
        </div>

        <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 12, lineHeight: 1.55 }}>
          Breakdown: BMR {out.bmr.toLocaleString()} kcal, {n.deskJob ? "desk-job" : "active-job"} baseline,
          + ~{out.stepsKcal} kcal from steps + ~{out.trainKcal} kcal/day averaged from {n.workouts} lifting sessions.
          Protein stays at <b>120–130 g/day</b> regardless of the calorie number. Optional: eat ~150 above target on
          training days and ~150 below on rest days — same weekly total, better session energy.
        </div>
      </div>

      {paceNote && (
        <div style={{ ...S.card, borderLeft: `4px solid ${paceNote.color}` }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>Auto-adjustment</div>
          <div style={{ fontSize: 13, color: "#3A3A3C", marginTop: 6, lineHeight: 1.5 }}>{paceNote.text}</div>
        </div>
      )}
      {!paceNote && (
        <div style={{ ...S.card, color: C.sub, fontSize: 13, lineHeight: 1.5 }}>
          Once you've logged ~6 body-weight entries, this tab starts checking your actual rate of loss
          against the −0.5 to −0.75 lb/week target and tells you when to adjust calories up or down.
        </div>
      )}
    </div>
  );
}
