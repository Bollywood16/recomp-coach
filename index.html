/* Rules engine: recommend a split from the emphasis sliders. */
function recommendTemplate(focus) {
  const f = focus || DEFAULT_FOCUS;
  const rank = (g) => LEVEL_RANK[f[g] ?? "normal"];
  const emph = (g) => rank(g) >= 2;
  const legsMaintained = f.legs === "maintain";
  if (emph("shoulders") && emph("arms") && legsMaintained) {
    return { key: "superhero", why: "Shoulders + arms emphasized with legs on maintain — this is the screen-physique configuration: three upper-dominant days, one maintenance lower day." };
  }
  if (["shoulders", "arms", "chest", "back"].some(emph)) {
    return { key: "upperFocus", why: "You have an upper-body emphasis active. A 3-upper / 1-lower week raises those muscles to ~2-3x/week while one consolidated lower day holds your legs." };
  }
  return { key: "balanced", why: "No strong emphasis set — 2 upper + 2 lower trains everything twice weekly, which the frequency research favors as the default." };
}

const PROGRAM_EXERCISES = Object.values(PROGRAMS).flatMap((p) => p.flatMap((d) => d.exercises));
const _dedupe = (arr) => { const seen = {}; return arr.filter((e) => (seen[e.id] ? false : (seen[e.id] = true))); };

/* ===== Cloud sync (Supabase) =====
   Optional. When configured + signed in, the whole data blob is mirrored to a
   single per-user row. Logs (sessions, weigh-ins) merge as a union so no device
   ever loses an entry; settings take the most recently updated copy. The app is
   fully functional with sync switched off — everything still saves locally. */
const SB_CFG_KEY = "recompcoach:sbcfg";
function getSbConfig() { try { return JSON.parse(localStorage.getItem(SB_CFG_KEY) || "null"); } catch (e) { return null; } }
function setSbConfig(cfg) { localStorage.setItem(SB_CFG_KEY, JSON.stringify(cfg)); }
function clearSbConfig() { localStorage.removeItem(SB_CFG_KEY); }
let _sbClient = null;
function getSbClient() {
  if (_sbClient) return _sbClient;
  const cfg = getSbConfig();
  if (!cfg || !cfg.url || !cfg.key || !window.supabase) return null;
  try { _sbClient = window.supabase.createClient(cfg.url, cfg.key); } catch (e) { return null; }
  return _sbClient;
}
function resetSbClient() { _sbClient = null; }

/* Union logs by identity, keep newest settings by _updatedAt. */
function mergeData(local, cloud) {
  if (!cloud) return local;
  if (!local) return cloud;
  const sById = {};
  [...(cloud.sessions || []), ...(local.sessions || [])].forEach((s) => { sById[s.id] = s; });
  const sessions = Object.values(sById).sort((a, b) => a.id - b.id);
  const wByDate = {};
  [...(cloud.weights || []), ...(local.weights || [])].forEach((w) => { wByDate[w.date] = w; });
  const weights = Object.values(wByDate).sort((a, b) => (a.date < b.date ? -1 : 1));
  const localNewer = (local._updatedAt || "") >= (cloud._updatedAt || "");
  const settingsSrc = localNewer ? local : cloud;
  return {
    ...cloud, ...local,
    sessions, weights,
    swaps: settingsSrc.swaps || {},
    nutrition: settingsSrc.nutrition || local.nutrition,
    focus: settingsSrc.focus || local.focus,
    plan: settingsSrc.plan || local.plan,
    phase: settingsSrc.phase || local.phase,
    _updatedAt: new Date().toISOString(),
  };
}

async function cloudPull(client, uid) {
  const { data, error } = await client.from("app_data").select("payload").eq("user_id", uid).maybeSingle();
  if (error) throw error;
  return data ? data.payload : null;
}
async function cloudPush(client, uid, payload) {
  const body = { user_id: uid, payload: { ...payload, _updatedAt: new Date().toISOString() }, updated_at: new Date().toISOString() };
  const { error } = await client.from("app_data").upsert(body);
  if (error) throw error;
}
let _pushTimer = null;
const OLD_KEY = "recompcoach:v1";

const CAT_NAMES = {
  hpress: "Horizontal press", vpress: "Overhead press", hpull: "Row", vpull: "Pulldown / pull-up",
  squat: "Squat pattern", hinge: "Hip hinge", quad: "Quad isolation", ham: "Hamstring",
  glute: "Glute", calf: "Calf", core: "Core", biceps: "Biceps", triceps: "Triceps", delts: "Side delts",
};

const DEFAULT_NUTRITION = { age: 35, sex: "male", heightIn: 67, deskJob: true, steps: 7000, workouts: 4 };
const DEFAULT_DATA = { sessions: [], weights: [], swaps: {}, nutrition: DEFAULT_NUTRITION, focus: null, plan: null, phase: null };


/* ===== Emphasis model (research-driven set redistribution) =====
   Weekly hard sets per muscle is the primary driver of regional growth. Each
   group has a maintenance floor (mv), a minimum effective dose for growth (mev),
   and an approximate recoverable ceiling (mav). Emphasis sliders scale the sets
   assigned to a group's exercises; the Focus tab tallies the result live. */
const MUSCLE_GROUPS = {
  shoulders: { name: "Shoulders", cats: ["vpress", "delts"], mv: 6, mev: 8, mav: 22 },
  arms:      { name: "Arms",      cats: ["biceps", "triceps"], mv: 6, mev: 8, mav: 24 },
  chest:     { name: "Chest",     cats: ["hpress"], mv: 6, mev: 10, mav: 20 },
  back:      { name: "Back",      cats: ["hpull", "vpull"], mv: 8, mev: 10, mav: 22 },
  legs:      { name: "Legs",      cats: ["squat", "hinge", "quad", "ham", "glute", "calf"], mv: 6, mev: 8, mav: 20 },
  core:      { name: "Core",      cats: ["core"], mv: 0, mev: 6, mav: 16 },
};
const CAT_TO_GROUP = {};
Object.entries(MUSCLE_GROUPS).forEach(([g, def]) => def.cats.forEach((c) => { CAT_TO_GROUP[c] = g; }));

const EMPHASIS_LEVELS = [
  { key: "maintain", label: "Maintain", mult: 0.55 },
  { key: "normal", label: "Normal", mult: 1.0 },
  { key: "emphasize", label: "Emphasize", mult: 1.4 },
  { key: "specialize", label: "Specialize", mult: 1.85 },
];
const DEFAULT_FOCUS = { shoulders: "normal", arms: "normal", chest: "normal", back: "normal", legs: "normal", core: "normal" };
const DEFAULT_PLAN = { template: "balanced", sessionMin: 60, templateSince: null };
const getProgram = (data) => PROGRAMS[(data.plan && data.plan.template) || "balanced"] || PROGRAMS.balanced;

/* Bonus exercises unlocked when a group is set to Specialize. Injected into the
   matching day so the extra volume lands where it trains that muscle. */
const BONUS = [
  // minLevel "emphasize": appears at Emphasize AND Specialize.
  { group: "shoulders", dayId: "upperB", minLevel: "emphasize", ex: { id: "bonus_sidelat", name: "Cable Lateral Raise (high-rep)", cat: "delts", repMin: 15, repMax: 20, start: 10, inc: 2.5 } },
  { group: "shoulders", dayId: "upperA", minLevel: "emphasize", ex: { id: "bonus_reardelt", name: "Reverse Pec-Deck (rear delt)", cat: "delts", repMin: 12, repMax: 20, start: 40, inc: 5 } },
  { group: "arms", dayId: "upperA", minLevel: "emphasize", ex: { id: "bonus_ohtri", name: "Overhead Cable Triceps Ext.", cat: "triceps", repMin: 10, repMax: 15, start: 30, inc: 5 } },
  { group: "arms", dayId: "upperB", minLevel: "emphasize", ex: { id: "bonus_preacher", name: "Preacher / Cable Curl", cat: "biceps", repMin: 10, repMax: 15, start: 30, inc: 5 } },
  // minLevel "specialize": only when pushed all the way — a second finisher.
  { group: "shoulders", dayId: "upperA", minLevel: "specialize", ex: { id: "bonus_dbpress", name: "DB Lateral Raise (drop set)", cat: "delts", repMin: 12, repMax: 20, start: 12, inc: 2.5, perHand: true } },
  { group: "arms", dayId: "upperB", minLevel: "specialize", ex: { id: "bonus_dbhammer", name: "Cross-Body Hammer Curl", cat: "biceps", repMin: 10, repMax: 15, start: 20, inc: 5, perHand: true } },
  { group: "chest", dayId: "upperA", minLevel: "specialize", ex: { id: "bonus_cablefly", name: "Cable Fly", cat: "hpress", repMin: 12, repMax: 20, start: 20, inc: 5 } },
  { group: "back", dayId: "upperB", minLevel: "specialize", ex: { id: "bonus_pullover", name: "Straight-Arm Pulldown", cat: "vpull", repMin: 12, repMax: 20, start: 40, inc: 5 } },
  { group: "legs", dayId: "lowerA", minLevel: "specialize", ex: { id: "bonus_walkinglunge", name: "Walking Lunge (pain-free ROM)", cat: "quad", repMin: 10, repMax: 12, start: 0, inc: 5, perHand: true } },
];
const LEVEL_RANK = { maintain: 0, normal: 1, emphasize: 2, specialize: 3 };
const BONUS_EX = BONUS.map((b) => b.ex);

BONUS_EX.forEach((b) => { if (!EX_BY_ID[b.id]) { ALL_KNOWN.push(b); EX_BY_ID[b.id] = b; } });

function emphasisMult(cat, focus) {
  const g = CAT_TO_GROUP[cat];
  if (!g || !focus || !focus[g]) return 1;
  const lvl = EMPHASIS_LEVELS.find((l) => l.key === focus[g]);
  return lvl ? lvl.mult : 1;
}
/* Scale a slot's base set count by its muscle's emphasis, clamped so it never
   disappears or balloons past a sane per-exercise cap. */
function adjustSets(baseSets, cat, focus) {
  const m = emphasisMult(cat, focus);
  return Math.max(1, Math.min((baseSets || 3) + 3, Math.round((baseSets || 3) * m)));
}
/* Which bonus exercises are active for a given day, based on Specialize focus. */
function bonusForDay(day, focus, program) {
  if (!focus || !day) return [];
  const prog = program || PROGRAMS.balanced;
  const out = [];
  const groupIdx = {};
  BONUS.forEach((b) => {
    const cur = LEVEL_RANK[focus[b.group]] ?? 1;
    if (cur < LEVEL_RANK[b.minLevel]) return;
    const gcats = MUSCLE_GROUPS[b.group].cats;
    const days = prog.filter((d) => d.exercises.some((e) => gcats.includes(e.cat)));
    if (!days.length) return;
    const i = (groupIdx[b.group] = (groupIdx[b.group] ?? -1) + 1);
    const target = days[i % days.length];
    if (target.id === day.id) {
      out.push({ ...b.ex, sets: 3, baseSets: 3, slotId: b.ex.id, swapped: false, isBonus: true, bonusGroup: b.group, focusBoost: true });
    }
  });
  return out;
}

/* ===== Time-budget engine =====
   Fits a day into the user's session length. Estimated cost per exercise =
   sets x (work + rest). Trimming order is research-informed: cut sets from
   non-focused isolation first, keep compounds >= 2 sets, never touch a focused
   muscle's volume until everything else is at minimum, and drop trailing
   non-focused isolation lifts only as a last resort. */
const COMPOUND_CATS = ["squat", "hinge", "hpress", "vpress", "hpull", "vpull"];
const isCompound = (ex) => COMPOUND_CATS.includes(ex.cat);

function fitDayToTime(list, sessionMin) {
  const budget = Math.max(20, (sessionMin || 60) - 8) * 60; // minus ~8 min warm-up
  const items = list.map((e) => ({ ...e }));
  const dur = (ex) => ex.sets * (40 + restFor(ex).sec);
  const total = () => items.reduce((a, e) => a + dur(e), 0);
  const minSets = (ex) => (isCompound(ex) ? 2 : 1);
  const prio = (ex) => (ex.focusBoost ? 2 : 0) + (isCompound(ex) ? 1 : 0);
  let trimmed = 0;
  const dropped = [];
  let guard = 200;
  while (total() > budget && guard-- > 0) {
    const cands = items.filter((e) => e.sets > minSets(e));
    if (cands.length) {
      cands.sort((a, b) => prio(a) - prio(b) || items.indexOf(b) - items.indexOf(a));
      cands[0].sets -= 1;
      trimmed++;
      continue;
    }
    // everything at minimum: drop the last non-focused isolation lift
    let idx = -1;
    for (let i = items.length - 1; i >= 0; i--) {
      if (!isCompound(items[i]) && !items[i].focusBoost) { idx = i; break; }
    }
    if (idx === -1) break;
    dropped.push(items[idx].name);
    items.splice(idx, 1);
  }
  return { list: items, trimmed, dropped, minutes: Math.round(total() / 60) + 8 };
}

function dayFittedMinutes(day, data) {
  const f = data.focus || DEFAULT_FOCUS;
  const p = getProgram(data);
  const list = [
    ...day.exercises.map((s) => resolveSlot(s, data.swaps, f)),
    ...bonusForDay(day, f, p),
  ];
  return fitDayToTime(list, (data.plan && data.plan.sessionMin) || 60).minutes;
}

/* ===== Auto-periodization (phase engine) =====
   Detects where you are in the process and adjusts the program:
   - Re-entry ramp: first ~4 weeks of logging after a layoff. Conservative
     loads, fast weekly progression ("muscle memory" re-acquisition).
   - Building block: the default. Double progression drives overload.
   - Deload: suggested when estimated 1RMs have stalled across most lifts for
     ~3 weeks (accumulated fatigue masking fitness). One week at ~60% sets and
     ~90% loads, then back to building — the standard evidence-based reset.
   - Block rotation: specialization splits are meant to run 8-12 weeks; after
     ~10 the engine suggests rotating back to Balanced so de-emphasized
     muscles return to full volume. Suggestions are one-tap, never silent. */

function trainingWeeks(sessions) {
  return new Set((sessions || []).map((s) => weekStart(s.date))).size;
}

function deloadActive(data) {
  const p = data.phase;
  return !!(p && p.deloadUntil && todayISO() <= p.deloadUntil);
}

/* Share of trained compound lifts whose weekly-best e1RM has not improved
   over the last 3 recorded weeks. */
function stallScore(data) {
  const lifts = ALL_KNOWN.filter(
    (ex) => isCompound(ex) && data.sessions.some((s) => s.exerciseId === ex.id)
  );
  let eligible = 0, stalled = 0;
  lifts.forEach((ex) => {
    const series = weeklySeries(data.sessions, ex.id);
    if (series.length < 3) return;
    eligible++;
    const recent = series.slice(-3);
    if (recent[2].e1 <= recent[0].e1 * 1.005) stalled++;
  });
  return { eligible, stalled, ratio: eligible ? stalled / eligible : 0 };
}

function templateWeeks(data) {
  const since = data.plan && data.plan.templateSince;
  if (!since) return 0;
  const ms = new Date(todayISO()) - new Date(since);
  return Math.floor(ms / (7 * 24 * 3600 * 1000));
}

function phaseInfo(data) {
  const wks = trainingWeeks(data.sessions);
  const suggestions = [];
  if (deloadActive(data)) {
    return {
      name: "Deload week", icon: "recover",
      note: `Reduced volume (~60% sets) and ~90% loads through ${shortDate(data.phase.deloadUntil)}. Fatigue drops faster than fitness — you'll come back stronger.`,
      suggestions,
    };
  }
  const st = stallScore(data);
  if (wks >= 6 && st.eligible >= 3 && st.ratio >= 0.6) {
    suggestions.push({
      type: "deload",
      text: `${st.stalled} of ${st.eligible} main lifts have stalled for ~3 weeks — the classic accumulated-fatigue signal. A 1-week deload is the evidence-based reset.`,
    });
  }
  const tmpl = (data.plan && data.plan.template) || "balanced";
  const tWks = templateWeeks(data);
  if ((tmpl === "superhero" || tmpl === "upperFocus") && tWks >= 10) {
    suggestions.push({
      type: "rotate",
      text: `You've run this specialization block for ${tWks} weeks. Research favors 8-12 week blocks, then rotating back to Balanced so de-emphasized muscles recover full volume.`,
    });
  }
  if (wks < 4) {
    return {
      name: "Re-entry ramp", icon: "ramp",
      note: `Week ${wks + 1} of ~4. Loads are deliberately conservative — post-layoff strength returns fast (myonuclear "muscle memory"), so expect quick weekly jumps without forcing them.`,
      suggestions,
    };
  }
  return {
    name: "Building block", icon: "build",
    note: `Week ${wks} of training. Double progression is the driver: hit the top of a rep range on all sets, add weight next session.`,
    suggestions,
  };
}

/* Live weekly-set tally per muscle group across the whole program + bonuses. */
function weeklySetsByGroup(data) {
  const focus = data.focus || DEFAULT_FOCUS;
  const program = getProgram(data);
  const t = {};
  program.forEach((day) => {
    const list = [
      ...day.exercises.map((slot) => resolveSlot(slot, data.swaps, focus)),
      ...bonusForDay(day, focus, program),
    ];
    const fitted = fitDayToTime(list, (data.plan && data.plan.sessionMin) || 60).list;
    fitted.forEach((ex) => {
      const g = CAT_TO_GROUP[ex.cat];
      if (g) t[g] = (t[g] || 0) + ex.sets;
    });
  });
  return t;
}

function researchForPhase(data) {
  const plan = (data.plan && data.plan.template) || "balanced";
  const weeks = trainingWeeks(data.sessions || []);
  const isReentry = weeks < 6;
  const isDeloading = deloadActive(data);
  const ss = stallScore(data);
  const isStalled = ss.eligible >= 2 && ss.ratio >= 0.5;
  const tags = new Set(["all"]);
  if (isReentry) { tags.add("reentry"); tags.add("injury_recovery"); }
  if (isDeloading) tags.add("deload");
  if (isStalled) tags.add("stalled");
  tags.add(plan);
  if (weeks >= 6 && !isDeloading && !isStalled) tags.add("building");
  // Specific-phase findings (injury, current template, stall) outrank generic ones,
  // so the 8-slot cap never crowds out the findings that matter most right now.
  const specificity = (r) => {
    if (r.phase.some((p) => ["reentry", "injury_recovery", "deload", "stalled"].includes(p) && tags.has(p))) return 0;
    if (r.phase.some((p) => ["superhero", "upperFocus", "maintain"].includes(p) && tags.has(p))) return 1;
    if (r.phase.includes("building") && tags.has("building")) return 2;
    return 3;
  };
  return RESEARCH_CORPUS
    .filter((r) => r.phase.some((p) => tags.has(p)))
    .sort((a, b) => specificity(a) - specificity(b))
    .slice(0, 8);
}

/* ===== Coach brief builder =====
   Assembles the export prompt following Anthropic prompt-engineering practice:
   role first, data in XML-tagged sections before instructions, explicit
   constraints, numbered tasks, and a strict output contract (one fenced JSON
   block) so the reply can be pasted back and applied through the safety gates. */
function buildCoachBrief(data, goalProfile) {
  const m = coachMetrics(data);
  m.lifts = m.lifts.slice(-14); // cap for prompt size
  const research = researchForPhase(data);
  const injury = goalProfile.injuryRecovery !== false;
  const gateLine = injury && m.weeksTraining < 8
    ? `HARD CONSTRAINT: the user is ${m.weeksTraining} logged week(s) into a return from injury. The template MUST be "balanced" until ~8 pain-free logged weeks, regardless of stated goals. If the goal implies otherwise, explain why this constraint wins for now and when it lifts.`
    : `Injury status: ${injury ? `recovering, ${m.weeksTraining} logged weeks (specialization gate lifts around week 8)` : "not currently in injury recovery"}.`;

  return `You are an evidence-based hypertrophy and body-recomposition coach reviewing real training data. Every number in <training_metrics> was computed deterministically from logged sessions — never invent, round, or adjust figures. Be direct: where the user's goals conflict with their constraints or the research, say so plainly rather than accommodating.

<goal_profile>
${goalProfile.text || "(not stated yet)"}
</goal_profile>

<constraints>
${gateLine}
Known injury history: hip labral tear + proximal hamstring tendinosis. No loaded deep hip flexion; squats stop at safety pins above parallel; hinges reduced ROM; any pain >3/10 during or 24h after a lift means reducing that lift 20% next session.
</constraints>

<training_metrics>
${JSON.stringify(m)}
</training_metrics>

<research_context>
${research.map((r) => `- [${r.source}] ${r.finding}`).join("\n")}
</research_context>

<instructions>
1. Assess progress against the stated goal using the actual numbers — name specific lifts and their trends.
2. Push back explicitly on every conflict between the user's desires and their constraints or the research above. Cite research_context sources when they drive a decision.
3. Recommend a plan: template ("balanced" | "upperFocus" | "superhero"); focus for each of shoulders, arms, chest, back, legs, core (each "maintain" | "normal" | "emphasize" | "specialize", with at most 2 groups at emphasize or above); sessionMin (45 | 60 | 75); calorieDelta (integer between -300 and +300 relative to the current target); and what to watch before the next check-in.
4. Keep the narrative under 300 words.
5. End your reply with exactly one fenced \`\`\`json code block containing ONLY this object (no comments): {"template":"...","focus":{"shoulders":"...","arms":"...","chest":"...","back":"...","legs":"...","core":"..."},"sessionMin":60,"calorieDelta":0} — the app parses this block to apply your plan through its safety gates.
</instructions>`;
}

function extractPlanJson(text) {
  const fence = text.match(/```json\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/);
  const raw = fence ? fence[1] : text;
  const s = raw.indexOf("{");
  const e = raw.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("No plan JSON found in the pasted text.");
  return JSON.parse(raw.slice(s, e + 1));
}

/* ============================ HELPERS ============================ */

const e1rm = (w, r) => (r >= 1 ? (w === 0 ? r : w * (1 + r / 30)) : 0);
const round5 = (x) => Math.max(5, Math.round(x / 5) * 5);

function weekStart(dateISO) {
  const d = new Date(dateISO + "T12:00:00");
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0, 10);
}
const shortDate = (iso) =>
  new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const todayISO = () => new Date().toISOString().slice(0, 10);
const currentBodyweight = (data) => {
  const w = [...(data.weights || [])].sort((a, b) => (a.date < b.date ? -1 : 1)).slice(-1)[0];
  return (w && w.lbs) || (data.nutrition && Number(data.nutrition ? 146 : 146)) || 146;
};

function bestSet(sets) {
  let best = null;
  for (const s of sets) {
    const v = e1rm(Number(s.w) || 0, Number(s.r) || 0);
    if (!best || v > best.v) best = { ...s, v };
  }
  return best;
}

function weeklySeries(sessions, exId) {
  const byWeek = {};
  const mine = sessions.filter((s) => s.exerciseId === exId);
  mine.forEach((s) => {
    const wk = weekStart(s.date);
    const b = bestSet(s.sets);
    if (!b) return;
    if (!byWeek[wk] || b.v > byWeek[wk].e1) {
      byWeek[wk] = { ...(byWeek[wk] || {}), week: wk, e1: b.v, topW: Number(b.w) || 0, topR: Number(b.r) || 0 };
    }
  });
  mine.forEach((s) => {
    const wk = weekStart(s.date);
    const vol = s.sets.reduce((a, x) => a + (Number(x.w) || 0) * (Number(x.r) || 0), 0);
    if (byWeek[wk]) byWeek[wk].vol = (byWeek[wk].vol || 0) + vol;
  });
  return Object.values(byWeek).sort((a, b) => (a.week < b.week ? -1 : 1));
}

/* Resolve a program slot through any active swap. The resolved exercise keeps
   the slot's set/rep scheme so the day's structure is preserved. */
function resolveSlot(slot, swaps, focus) {
  const swapId = swaps && swaps[slot.id];
  const base = (!swapId || !EX_BY_ID[swapId])
    ? { ...slot, slotId: slot.id, swapped: false }
    : { ...EX_BY_ID[swapId], repMin: slot.repMin, repMax: slot.repMax,
        slotId: slot.id, swapped: true, originalName: slot.name };
  // Emphasis scales the number of working sets for this exercise's muscle.
  const baseSets = slot.sets;
  base.sets = focus ? adjustSets(baseSets, base.cat, focus) : baseSets;
  base.baseSets = baseSets;
  base.focusBoost = focus ? (LEVEL_RANK[focus[CAT_TO_GROUP[base.cat]] ?? "normal"] >= 2) : false;
  return base;
}

/* Working weight = heaviest weight used in the most recent session of a lift */
function lastWorkingWeight(sessions, exId) {
  const hist = sessions.filter((s) => s.exerciseId === exId).sort((a, b) => (a.date < b.date ? -1 : 1));
  if (!hist.length) return null;
  return Math.max(...hist[hist.length - 1].sets.map((s) => Number(s.w) || 0));
}

/* Recommendation engine: double progression, plus cross-lift estimation for
   exercises you haven't logged yet (used when swapping something new in). */
function recommend(ex, sessions, deload) {
  const hist = sessions
    .filter((s) => s.exerciseId === ex.id)
    .sort((a, b) => (a.date < b.date ? -1 : 1));

  if (hist.length === 0) {
    if (ex.basedOn) {
      const refW = lastWorkingWeight(sessions, ex.basedOn.ex);
      if (refW) {
        const refName = EX_BY_ID[ex.basedOn.ex]?.name || "a related lift";
        return {
          weight: round5(refW * ex.basedOn.ratio),
          tag: "Estimated",
          note: `Estimated from your ${refName} (${refW} lb). Treat set 1 as a feeler and adjust.`,
        };
      }
    }
    return {
      weight: ex.start,
      tag: "Start",
      note: ex.start === 0
        ? "Bodyweight to begin. Add load once you clear the top of the rep range."
        : "Conservative starting weight. Should feel easy — that's the point.",
    };
  }

  const last = hist[hist.length - 1];
  const reps = last.sets.map((s) => Number(s.r) || 0);
  const w = Math.max(...last.sets.map((s) => Number(s.w) || 0));
  if (deload) {
    return { weight: round5(w * 0.9), tag: "Deload", note: `Deload week: ~90% of your last working weight (${w} lb), reduced sets, stop 3-4 reps shy of failure. Recovery is the goal.` };
  }
  const allTop = reps.length > 0 && reps.every((r) => r >= ex.repMax);
  const anyBelow = reps.some((r) => r > 0 && r < ex.repMin);
  const inc = ex.inc ?? 5;
  if (allTop && inc > 0) {
    return { weight: w + inc, tag: "Add weight", note: `You hit ${ex.repMax}+ reps on every set at ${w} lb. Move up.` };
  }
  if (anyBelow) {
    return { weight: w, tag: "Hold", note: `Some sets fell under ${ex.repMin} reps. Stay at ${w} lb and build reps.` };
  }
  return { weight: w, tag: "Add reps", note: `Same weight (${w} lb) — aim for +1 rep per set toward ${ex.repMax}.` };
}

function trendPct(series) {
  if (series.length < 2) return null;
  const recent = series.slice(-4);
  const first = recent[0].e1, last = recent[recent.length - 1].e1;
  if (!first) return null;
  return { pct: ((last - first) / first) * 100, weeks: recent.length - 1 };
}


/* Rest recommendations: heavier compounds recover better with 2–3 min
   (rest-interval literature favors >=2 min for hypertrophy on big lifts);
   isolation work is productive at 60–90 s. */
function restFor(ex) {
  if (["squat", "hinge", "glute"].includes(ex.cat)) return { sec: 180, label: "2–3 min" };
  if (["hpress", "vpress", "hpull", "vpull"].includes(ex.cat)) return { sec: 120, label: "~2 min" };
  return { sec: 90, label: "60–90 s" };
}

function dayDurationMin(day, swaps, focus) {
  let total = 0;
  day.exercises.forEach((slot) => {
    const ex = resolveSlot(slot, swaps, focus);
    total += ex.sets * (40 + restFor(ex).sec);
  });
  return Math.round(total / 60 / 5) * 5;
}

/* Nutrition math: Mifflin-St Jeor BMR + additive activity model
   (base occupational multiplier + step count + training sessions). */
function computeNutrition(n, latestBw) {
  const lbs = latestBw || 146;
  const kg = lbs / 2.2046;
  const cm = (Number(n.heightIn) || 67) * 2.54;
  const age = Number(n.age) || 35;
  const bmr = Math.round(10 * kg + 6.25 * cm - 5 * age + (n.sex === "female" ? -161 : 5));
  const baseMult = n.deskJob ? 1.1 : 1.28;
  const stepsKcal = (Number(n.steps) || 0) * 0.045 * (lbs / 150);
  const trainKcal = ((Number(n.workouts) || 0) * 300) / 7;
  const tdee = Math.round(bmr * baseMult + stepsKcal + trainKcal);
  const target = Math.round((tdee - 350) / 10) * 10;
  return { lbs, bmr, tdee, target, stepsKcal: Math.round(stepsKcal), trainKcal: Math.round(trainKcal) };
}

      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) found = JSON.parse(res.value);
      } catch (e) { /* no v2 data yet */ }
      if (!found) {
        try {
          const old = await window.storage.get(OLD_KEY);
          if (old && old.value) found = JSON.parse(old.value); // migrate v1 logs
        } catch (e) { /* no v1 data either */ }

        });
      }
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {
    const stamped = { ...next, _updatedAt: new Date().toISOString() };
    setData(stamped);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(stamped));

      if (_pushTimer) clearTimeout(_pushTimer);

        try {
          setSyncStatus("Syncing…");
          await cloudPush(client, sbUser.id, stamped);
          setSyncStatus("Synced");
          setTimeout(() => setSyncStatus(""), 1500);
        } catch (e) {
          setSyncStatus("Sync failed — saved locally");
        }
      }, 1200);
    }
  };

  // Pull + merge cloud data on login; expose a manual sign-in handler to SyncCard.
  const onSignedIn = async (user) => {
    setSbUser(user);

    if (!client || !user) return;
    try {
      setSyncStatus("Syncing…");
      const cloud = await cloudPull(client, user.id);
      const merged = mergeData(data, cloud);
      setData(merged);
      await window.storage.set(STORAGE_KEY, JSON.stringify(merged));

      setSyncStatus("Synced");
      setTimeout(() => setSyncStatus(""), 1500);
    } catch (e) {
      setSyncStatus("Sync failed — saved locally");
    }
  };
  const onSignedOut = () => { setSbUser(null); setSyncStatus(""); };

  // Restore an existing Supabase session on load (keeps you logged in).
  useEffect(() => {
    const client = getSbClient();
    if (!client) return;

      if (d && d.session && d.session.user) onSignedIn(d.session.user);
    });

      if (session && session.user) setSbUser(session.user); else setSbUser(null);
    });
    return () => { if (sub && sub.subscription) sub.subscription.unsubscribe(); };
  }, [loaded]); // eslint-disable-line

  return (
    <div style={S.app}>
      {tab === "today" && <WorkoutFlow data={data} persist={persist} />}
      {tab === "log" && <Log data={data} persist={persist} loaded={loaded} sbUser={sbUser} syncStatus={syncStatus} onSignedIn={onSignedIn} onSignedOut={onSignedOut} />}

/* Summary of Focus effects on a given day: which muscles are emphasized here,
   how many sets were added vs base, and how many bonus lifts were injected. */
function dayFocusSummary(day, data) {
  const focus = data.focus || DEFAULT_FOCUS;
  let added = 0, groups = new Set();
  day.exercises.forEach((slot) => {
    const ex = resolveSlot(slot, data.swaps, focus);
    const g = CAT_TO_GROUP[ex.cat];
    const delta = (ex.sets || 0) - (ex.baseSets || ex.sets || 0);
    if (delta > 0 && g) { added += delta; groups.add(MUSCLE_GROUPS[g]?.name); }
    if (delta < 0 && g) { groups.add(MUSCLE_GROUPS[g]?.name); }
  });
  const bonus = bonusForDay(day, focus, getProgram(data));
  bonus.forEach((b) => { const g = CAT_TO_GROUP[b.cat]; if (g) groups.add(MUSCLE_GROUPS[g]?.name); });
  return { added, bonusCount: bonus.length, groups: [...groups] };
}

                <Sparkles size={18} color={C.green} style={{ marginTop: 1, flexShrink: 0 }} />
                <div style={{ fontSize: 13, color: "#3A3A3C", lineHeight: 1.45 }}>
                  <b style={{ color: C.green }}>Deload week:</b> sets cut to ~60%, loads to ~90%, through {shortDate(data.phase.deloadUntil)}.
                  Move well, leave reps in the tank, come back fresh.
                </div>
              </div>
            )}
            {(fit.trimmed > 0 || fit.dropped.length > 0) && (
              <div style={{ ...S.card, background: "#F7F7FA", display: "flex", gap: 10, alignItems: "flex-start" }}>
                <Flame size={18} color={C.orange} style={{ marginTop: 1, flexShrink: 0 }} />
                <div style={{ fontSize: 13, color: "#3A3A3C", lineHeight: 1.45 }}>
                  <b>Fitted to ~{fit.minutes} min</b> for your {(data.plan && data.plan.sessionMin) || 60}-minute session:
                  trimmed {fit.trimmed} set{fit.trimmed !== 1 ? "s" : ""}
                  {fit.dropped.length > 0 ? `, skipped ${fit.dropped.join(", ")}` : ""}.
                  Compounds and focused muscles were protected first. More time = more volume — change it in Focus.
                </div>
              </div>
            )}
            {fit.list.map((ex) => {
              const entry = entries.find((e) => e.ex.slotId === ex.slotId);
              return (
                <ExerciseCard
                  key={ex.slotId}
                  slot={entry ? entry.slot : ex}
                  ex={ex}
                  data={data}
                  persist={persist}
                  open={openId === ex.slotId}
                  onToggle={() => setOpenId(openId === ex.slotId ? null : ex.slotId)}
                  done={!!loggedToday(ex.id)}
                />
              );
            })}
          </>
        );
      })()}

      <div style={{ ...S.card, background: "#EAF3FF" }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.blue }}>Coach notes</div>
        <div style={{ fontSize: 13, lineHeight: 1.5, marginTop: 6, color: "#3A3A3C" }}>
          Warm up first: 5 min easy cardio, hip mobility, 2–3 ramp-up sets on the first lift.
          Squat: safety pins stay above parallel — the pins are your depth governor.
          Pain above 3/10 during or 24h after → drop that lift 20% next session.
        </div>
      </div>
    </div>
  );
}

function ExerciseCard({ slot, ex, data, persist, open, onToggle, done }) {
  const rec = recommend(ex, data.sessions, deloadActive(data));
  const rest = restFor(ex);
  const [sets, setSets] = useState(null);
  const [swapMode, setSwapMode] = useState(false);
  const [timer, setTimer] = useState(null);
  const [flash, setFlash] = useState(false);
  const [assist, setAssist] = useState(true); // for assistable lifts: enter machine assist
  const bw = currentBodyweight(data);

  useEffect(() => {
    if (timer === null || timer <= 0) return;
    const t = setTimeout(() => setTimer(timer - 1), 1000);
    return () => clearTimeout(t);
  }, [timer]);

  // Prefill the form with the recommended weight when opened
  useEffect(() => {
    if (open && sets === null) {
      setSets(Array.from({ length: ex.sets }, () => ({ w: rec.weight === 0 ? "" : String(rec.weight), r: "" })));
    }
    if (!open) { setSets(null); setSwapMode(false); setTimer(null); }
  }, [open]); // eslint-disable-line

  const saveSession = () => {
    const assistMode = ex.assistable && assist;
    const clean = (sets || [])
      .map((s) => {
        const raw = Number(s.w) || 0;
        const r = Number(s.r) || 0;
        if (assistMode) {
          // Entered value is machine assistance; store what was actually lifted.
          const eff = Math.max(1, Math.round(bw - raw));
          return { w: eff, r, assist: raw, bw };
        }
        return { w: raw, r };
      })
      .filter((s) => s.r > 0);
    if (clean.length === 0) return;
    const session = { id: Date.now(), date: todayISO(), exerciseId: ex.id, sets: clean };
    persist({ ...data, sessions: [...data.sessions, session] });
    setFlash(true);
    setTimeout(() => { setFlash(false); onToggle(); }, 900);
  };

  const setSwap = (newExId) => {
    const swaps = { ...data.swaps };
    if (newExId) swaps[slot.id] = newExId; else delete swaps[slot.id];
    persist({ ...data, swaps });
    setSwapMode(false);
    setSets(null); // re-prefill with the new exercise's recommendation
  };

  const alternates = [
    ...(ex.swapped ? [{ ...slot, isOriginal: true }] : []),
    ...ALL_KNOWN.filter((a) => a.cat === slot.cat && a.id !== ex.id && a.id !== slot.id),
  ];

  const tagStyle =
    rec.tag === "Add weight" ? S.tag("#E8F8EE", C.green)
    : rec.tag === "Hold" ? S.tag("#FFF1E5", C.orange)
    : rec.tag === "Start" || rec.tag === "Estimated" ? S.tag("#EAF3FF", C.blue)
    : S.tag("#F0F0F3", C.sub);

  const mmss = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
  const setDelta = (ex.sets || 0) - (ex.baseSets || ex.sets || 0);
  const isBonus = !!slot.isBonus;

  return (
    <div style={{ ...S.card, borderLeft: done ? `4px solid ${C.green}` : "none" }}>
      {/* Collapsed header — always visible, tap to open/close */}
      <button
        onClick={onToggle}
        style={{ ...font, display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", background: "transparent", border: "none", cursor: "pointer", textAlign: "left", padding: 0 }}
      >
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span>{done && <span style={{ color: C.green }}>✓ </span>}{ex.name}</span>
            {isBonus && <span style={S.tag("#EAF3FF", C.blue)}>Focus bonus</span>}
            {!isBonus && setDelta > 0 && <span style={S.tag("#E8F8EE", C.green)}>+{setDelta} set{setDelta > 1 ? "s" : ""}</span>}
            {!isBonus && setDelta < 0 && <span style={S.tag("#F0F0F3", C.sub)}>maintain</span>}
          </div>
          <div style={{ color: C.sub, fontSize: 13, marginTop: 3 }}>
            {ex.sets} × {ex.repMin}–{ex.repMax} at {rec.weight === 0 ? "BW" : `${rec.weight} lb${ex.perHand ? "/hand" : ""}`} · rest {rest.label}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={tagStyle}>{rec.tag}</span>
          <ChevronRight size={18} color={C.sub} style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform .15s" }} />
        </div>
      </button>

      {open && (
        <div style={{ marginTop: 14, borderTop: `1px solid ${C.line}`, paddingTop: 14 }}>
          <div style={{ color: C.sub, fontSize: 13, lineHeight: 1.45, marginBottom: 12 }}>{rec.note}</div>

          {ex.assistable && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 6 }}>
                <button style={{ ...S.chip(assist), flex: 1 }} onClick={() => setAssist(true)}>Machine assist</button>
                <button style={{ ...S.chip(!assist), flex: 1 }} onClick={() => setAssist(false)}>Bodyweight / +weight</button>
              </div>
              {assist && (
                <div style={{ fontSize: 12.5, color: C.sub, marginTop: 8, lineHeight: 1.45 }}>
                  Enter the <b>assistance</b> the machine gives. It's logged as effective weight
                  (your bodyweight {Math.round(bw)} lb − assist), so the number climbs as you get stronger.
                </div>
              )}
            </div>
          )}

          {(sets || []).map((s, i) => (
            <div key={i} style={{ ...S.row, marginBottom: 8 }}>
              <span style={{ width: 44, color: C.sub, fontSize: 13, fontWeight: 600 }}>Set {i + 1}</span>
              <input
                style={S.input} type="number" inputMode="decimal"
                placeholder={ex.assistable && assist ? "assist lbs" : "lbs"}
                value={s.w} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, w: e.target.value } : x)))}
              />
              <input
                style={S.input} type="number" inputMode="numeric" placeholder="reps"
                value={s.r} onChange={(e) => setSets(sets.map((x, j) => (j === i ? { ...x, r: e.target.value } : x)))}
              />
            </div>
          ))}
          {ex.assistable && assist && (sets || []).some((s) => Number(s.w) > 0) && (
            <div style={{ fontSize: 12, color: C.blue, marginBottom: 4 }}>
              Will log: {(sets || []).filter((s) => Number(s.w) > 0 || Number(s.r) > 0).map((s, i) =>
                `${Math.max(1, Math.round(bw - (Number(s.w) || 0)))}×${Number(s.r) || 0}`).join("  ")} (effective lb)
            </div>
          )}

          <div style={{ ...S.row, marginTop: 4, flexWrap: "wrap", gap: 8 }}>
            <button style={S.smallPill()} onClick={() => setSets([...(sets || []), { w: rec.weight === 0 ? "" : String(rec.weight), r: "" }])}>
              <Plus size={13} /> Add set
            </button>
            {!slot.isBonus && (
              <button style={S.smallPill(swapMode ? "#DCEBFF" : "#E9E9EB", swapMode ? C.blue : C.text)} onClick={() => setSwapMode(!swapMode)}>
                {swapMode ? <X size={13} /> : <Repeat size={13} />} {swapMode ? "Close" : "Swap"}
              </button>
            )}
            {timer === null ? (
              <button style={S.smallPill("#FFF1E5", C.orange)} onClick={() => setTimer(rest.sec)}>
                Start {rest.label} rest
              </button>
            ) : timer > 0 ? (
              <button style={S.smallPill("#FFF1E5", C.orange)} onClick={() => setTimer(null)}>
                Rest {mmss(timer)} · tap to skip
              </button>
            ) : (
              <button style={S.smallPill("#E8F8EE", C.green)} onClick={() => setTimer(null)}>
                Rest done — go
              </button>
            )}
          </div>

          {swapMode && (
            <div style={{ marginTop: 12, borderTop: `1px solid ${C.line}`, paddingTop: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 8 }}>
                {CAT_NAMES[slot.cat] || "Alternates"}
              </div>
              {alternates.map((alt) => {
                const preview = recommend(
                  { ...alt, sets: slot.sets, repMin: slot.repMin, repMax: slot.repMax },
                  data.sessions
                );
                return (
                  <button
                    key={alt.id}
                    onClick={() => setSwap(alt.isOriginal ? null : alt.id)}
                    style={{
                      ...font, display: "flex", justifyContent: "space-between", alignItems: "center",
                      width: "100%", background: "#F7F7FA", border: `1px solid ${C.line}`,
                      borderRadius: 12, padding: "10px 12px", marginBottom: 8, cursor: "pointer", textAlign: "left",
                    }}
                  >
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>
                        {alt.isOriginal ? `Back to program: ${alt.name}` : alt.name}
                      </div>
                      {alt.caution && (
                        <div style={{ fontSize: 12, color: C.orange, marginTop: 2 }}>{alt.caution}</div>
                      )}
                    </div>
                    <div style={{ color: C.blue, fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", marginLeft: 8 }}>
                      {preview.weight === 0 ? "BW" : `${preview.weight} lb`}
                    </div>
                  </button>
                );
              })}
            </div>
          )}

          <button
            style={{ ...S.pillBtn(flash ? C.green : C.blue), width: "100%", marginTop: 12 }}
            onClick={saveSession}
          >
            {flash ? "Saved ✓" : "Save session"}
          </button>
        </div>
      )}
    </div>
  );
}

function SyncCard({ data, sbUser, syncStatus, onSignedIn, onSignedOut }) {
  const cfg = getSbConfig();
  const [url, setUrl] = useState(cfg ? cfg.url : "");
  const [key, setKey] = useState(cfg ? cfg.key : "");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [showSetup, setShowSetup] = useState(!cfg);

  const saveConfig = () => {
    if (!url.trim() || !key.trim()) { setErr("Paste both the Project URL and the anon key."); return; }
    setSbConfig({ url: url.trim(), key: key.trim() });
    resetSbClient();
    setErr("");
    setShowSetup(false);
  };

  const authAction = async (mode) => {
    setErr(""); setBusy(true);
    const client = getSbClient();
    if (!client) { setErr("Save your Supabase settings first."); setBusy(false); return; }
    try {
      const fn = mode === "signup" ? "signUp" : "signInWithPassword";
      const { data: res, error } = await client.auth[fn]({ email: email.trim(), password: pw });
      if (error) throw error;
      const user = res && res.user;
      if (!user) throw new Error("No session returned. If you just signed up, disable email confirmation in Supabase (Authentication → Providers → Email).");
      await onSignedIn(user);
      setPw("");
    } catch (e) {
      setErr(e.message || "Auth failed.");
    }
    setBusy(false);
  };

  const signOut = async () => {
    const client = getSbClient();
    if (client) { try { await client.auth.signOut(); } catch (e) {} }
    onSignedOut();
  };

  const configured = !!getSbConfig();

  return (
    <div style={{ ...S.card, background: "#F0F7FF" }}>
      <div style={{ ...S.row, justifyContent: "space-between" }}>
        <span style={{ fontWeight: 700, fontSize: 15 }}>Cloud sync</span>
        {sbUser
          ? <span style={S.tag("#E8F8EE", C.green)}>Signed in</span>
          : configured ? <span style={S.tag("#FFF1E5", C.orange)}>Not signed in</span>
          : <span style={S.tag("#F0F0F3", C.sub)}>Not set up</span>}
      </div>

      {sbUser ? (
        <div style={{ marginTop: 8 }}>
          <div style={{ fontSize: 13, color: "#3A3A3C", lineHeight: 1.5 }}>
            Syncing as <b>{sbUser.email}</b>. Your logs back up automatically and load on any device you sign
            in from. {syncStatus && <span style={{ color: C.blue }}>· {syncStatus}</span>}
          </div>
          <button style={{ ...S.pillBtn("#E9E9EB", C.text), marginTop: 12 }} onClick={signOut}>Sign out</button>
        </div>
      ) : (
        <div style={{ marginTop: 8 }}>
          {!showSetup && configured ? null : (
            <>
              <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.5, marginBottom: 10 }}>
                One-time setup: create a free Supabase project, then paste its <b>Project URL</b> and <b>anon
                public key</b> (Settings → API). Steps are in the chat.
              </div>
              <input style={{ ...S.input, marginBottom: 8 }} placeholder="Project URL (https://xxxx.supabase.co)"
                value={url} onChange={(e) => setUrl(e.target.value)} />
              <input style={{ ...S.input, marginBottom: 8 }} placeholder="anon public key (eyJ...)"
                value={key} onChange={(e) => setKey(e.target.value)} />
              <button style={{ ...S.pillBtn(), width: "100%" }} onClick={saveConfig}>Save settings</button>
            </>
          )}

          {configured && (
            <div style={{ marginTop: showSetup ? 14 : 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Sign in to sync</div>
              <input style={{ ...S.input, marginBottom: 8 }} type="email" autoCapitalize="none" placeholder="email"
                value={email} onChange={(e) => setEmail(e.target.value)} />
              <input style={{ ...S.input, marginBottom: 8 }} type="password" placeholder="password"
                value={pw} onChange={(e) => setPw(e.target.value)} />
              <div style={S.row}>
                <button style={{ ...S.pillBtn(), flex: 1 }} disabled={busy} onClick={() => authAction("login")}>Log in</button>
                <button style={{ ...S.pillBtn("#E9E9EB", C.text), flex: 1 }} disabled={busy} onClick={() => authAction("signup")}>Sign up</button>
              </div>
              <button style={{ ...S.smallPill("transparent", C.sub), marginTop: 8 }} onClick={() => { clearSbConfig(); resetSbClient(); setShowSetup(true); }}>
                Change Supabase settings
              </button>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 8, lineHeight: 1.45 }}>
                First sign-in pushes your existing {data.sessions.length} sessions to the cloud — nothing is lost.
              </div>
            </div>
          )}
          {err && <div style={{ marginTop: 10, fontSize: 13, color: C.red, lineHeight: 1.4 }}>{err}</div>}
        </div>
      )}
    </div>
  );
}

function BackupCard({ data, persist }) {
  const [msg, setMsg] = useState("");
  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  const exportData = () => {
    try {
      const payload = JSON.stringify({ app: "recomp-coach", version: 8, exportedAt: new Date().toISOString(), data }, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `recomp-coach-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      flash("Backup file created — save it to Files or iCloud.");
    } catch (e) {
      flash("Export failed on this device.");
    }
  };

  const importData = (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        const incoming = parsed && parsed.data ? parsed.data : parsed;
        if (!incoming || !Array.isArray(incoming.sessions)) throw new Error("bad file");
        const merged = {
          ...data, ...incoming,
          sessions: incoming.sessions || data.sessions,
          weights: incoming.weights || data.weights,
          swaps: incoming.swaps || data.swaps || {},
          nutrition: { ...(data.nutrition || {}), ...(incoming.nutrition || {}) },
          focus: { ...(data.focus || {}), ...(incoming.focus || {}) },
          plan: { ...(data.plan || {}), ...(incoming.plan || {}) },
          phase: incoming.phase || data.phase || {},
        };
        persist(merged);
        flash(`Restored ${merged.sessions.length} sessions and ${merged.weights.length} weigh-ins.`);
      } catch (e) {
        flash("Couldn't read that file — make sure it's a Recomp Coach backup.");
      }
    };
    reader.readAsText(file);
    ev.target.value = "";
  };

  return (
    <div style={{ ...S.card, background: "#F7F7FA" }}>
      <div style={{ fontWeight: 700, fontSize: 15 }}>Backup & restore</div>
      <div style={{ fontSize: 12.5, color: C.sub, marginTop: 4, lineHeight: 1.45 }}>
        Your logs live on this device only. <b>Export before any app update</b>, then Import after — that
        keeps every session safe across upgrades and new phones.
      </div>
      <div style={{ ...S.row, marginTop: 12 }}>
        <button style={{ ...S.pillBtn(), flex: 1 }} onClick={exportData}>Export backup</button>
        <label style={{ ...S.pillBtn("#E9E9EB", C.text), flex: 1, textAlign: "center", cursor: "pointer" }}>
          Import backup
          <input type="file" accept="application/json,.json" onChange={importData} style={{ display: "none" }} />
        </label>
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginTop: 10, lineHeight: 1.4 }}>
        {data.sessions.length} sessions · {data.weights.length} weigh-ins currently stored.
      </div>
      {msg && (
        <div style={{ marginTop: 10, fontSize: 13, fontWeight: 600, color: C.green }}>{msg}</div>
      )}
    </div>
  );
}

function Log({ data, persist, loaded, sbUser, syncStatus, onSignedIn, onSignedOut }) {
  const resolvedProgram = getProgram(data).map((d) => ({
    ...d,
    exercises: d.exercises.map((slot) => resolveSlot(slot, data.swaps, data.focus)),
  }));
  const [exId, setExId] = useState(resolvedProgram[0].exercises[0].id);
  const [sets, setSets] = useState([{ w: "", r: "" }, { w: "", r: "" }, { w: "", r: "" }]);
  const [bw, setBw] = useState("");
  const [savedFlash, setSavedFlash] = useState("");

  const flash = (msg) => { setSavedFlash(msg); setTimeout(() => setSavedFlash(""), 2000); };

  const saveSession = () => {
    const clean = sets
      .map((s) => ({ w: Number(s.w) || 0, r: Number(s.r) || 0 }))
      .filter((s) => s.r > 0);
    if (clean.length === 0) return;
    const session = { id: Date.now(), date: todayISO(), exerciseId: exId, sets: clean };
    persist({ ...data, sessions: [...data.sessions, session] });
    setSets([{ w: "", r: "" }, { w: "", r: "" }, { w: "", r: "" }]);
    flash("Session saved");
  };

  const saveWeight = () => {
    const lbs = Number(bw);
    if (!lbs) return;
    const weights = data.weights.filter((x) => x.date !== todayISO());
    persist({ ...data, weights: [...weights, { date: todayISO(), lbs }] });
    setBw("");
    flash("Body weight saved");
  };

  const deleteSession = (id) => {
    persist({ ...data, sessions: data.sessions.filter((s) => s.id !== id) });
  };

  const recent = [...data.sessions].sort((a, b) => b.id - a.id).slice(0, 6);
  const loggedIds = new Set(data.sessions.map((s) => s.exerciseId));
  const programIds = new Set(resolvedProgram.flatMap((d) => d.exercises.map((e) => e.id)));
  const extraLogged = ALL_KNOWN.filter((e) => loggedIds.has(e.id) && !programIds.has(e.id));

  return (
    <div>
      <header style={S.header}>
        <h1 style={S.h1}>Log</h1>
        <div style={S.sub}>{loaded ? "Everything you enter is saved automatically." : "Loading…"}</div>
      </header>

      {savedFlash && (
        <div style={{ ...S.card, background: "#E8F8EE", color: C.green, fontWeight: 700, fontSize: 14, textAlign: "center" }}>
          {savedFlash}
        </div>
      )}

      <div style={S.card}>
        <div style={{ ...S.row, marginBottom: 10 }}>
          <Scale size={18} color={C.blue} />
          <span style={{ fontWeight: 700, fontSize: 15 }}>Body weight</span>
        </div>
        <div style={S.row}>
          <input
            style={S.input} type="number" inputMode="decimal" placeholder="lbs (e.g., 146.2)"
            value={bw} onChange={(e) => setBw(e.target.value)}
          />
          <button style={S.pillBtn()} onClick={saveWeight}>Save</button>
        </div>
      </div>

      <div style={S.card}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Log a lift</div>
        <select
          style={{ ...S.input, appearance: "none", marginBottom: 12 }}
          value={exId} onChange={(e) => setExId(e.target.value)}
        >
          {resolvedProgram.map((d) => (
            <optgroup key={d.id} label={d.name}>
              {d.exercises.map((ex) => (
                <option key={ex.slotId} value={ex.id}>{ex.name}</option>
              ))}
            </optgroup>
          ))}
          {extraLogged.length > 0 && (
            <optgroup label="Previously logged">
              {extraLogged.map((ex) => (
                <option key={ex.id} value={ex.id}>{ex.name}</option>
              ))}
            </optgroup>
          )}
        </select>

        {sets.map((s, i) => (
          <div key={i} style={{ ...S.row, marginBottom: 8 }}>
            <span style={{ width: 44, color: C.sub, fontSize: 13, fontWeight: 600 }}>Set {i + 1}</span>
            <input
